<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta charset="UTF-8">
  <title>dongbaegi video</title>

  <script src="./../xr_st/8frame-1.4.1.min.js"></script>
  <script src="./aframe-chromakey-material.min.js"></script>
  <script src="./../xr_st/landing-page.js"></script>

  <script src="./../xr_st/xrextras.js"></script>
  <script async src="./../xr_st/xr.js" data-preload-chunks="slam"></script>
  <script src="./target-sound.js"></script>
</head>

<body>

  <a-scene
    xrextras-gesture-detector
    landing-page
    xrextras-loading
    xrextras-runtime-error
    xrweb="disableWorldTracking: true; allowedDevices: any">

    <a-assets>
      <video
        id="alpha-video"
        muted
        playsinline
        crossorigin="anonymous"
        loop="true"
        preload="auto"
        src="./ai-girl-hanbok.mp4">
        <!-- autoplay 없음: 이미지 타겟 인식 시에만 재생 -->
      </video>
    </a-assets>

    <a-camera
      position="0 4 10"
      raycaster="objects: .cantap"
      cursor="fuse: false; rayOrigin: mouse;">
    </a-camera>

    <a-light type="directional" intensity="0.5" position="1 1 1"></a-light>
    <a-light type="ambient" intensity="1"></a-light>

    <a-entity
      target-video="name: dongbaegi-ar; video: #alpha-video;"
      material="shader: chromakey; src: #alpha-video; color: 0 0.5 1"
      geometry="primitive: plane; height: 1.65; width: 1.65;"
      rotation="0 90 0">
    </a-entity>

  </a-scene>

  <script>
    // ── safe-vr-fix ───────────────────────────────────────────
    AFRAME.registerComponent('safe-vr-fix', {
      init: function () {
        const sceneEl = this.el.sceneEl;
        if (sceneEl.enterVRButton) {
          const origUpdate = sceneEl.enterVRButton.updateEnterInterfaces;
          sceneEl.enterVRButton.updateEnterInterfaces = function () {
            if (origUpdate) origUpdate.apply(this, arguments);
          };
        }
      }
    });
    document.querySelector('a-scene').setAttribute('safe-vr-fix', '');

    // ── 오디오 잠금 해제 ──────────────────────────────────────
    let audioUnlocked = false;

    // 첫 터치 시 조용히 오디오 컨텍스트 잠금 해제
    // (화면 변화 없음 - AR 씬을 터치하는 순간 자동 처리)
    function unlockAudio(video) {
      if (audioUnlocked) return Promise.resolve();
      return video.play().then(() => {
        video.pause();
        video.currentTime = 0;
        video.muted = false;
        audioUnlocked = true;
        console.log('[AR] 오디오 잠금 해제 완료');
      }).catch(err => {
        console.warn('[AR] 오디오 잠금 해제 실패:', err);
      });
    }

    // ── target-dongb.js 에서 호출하는 전역 재생 함수 ─────────
    window.playVideoWithAudio = function(video) {
      video.currentTime = 0;

      if (audioUnlocked) {
        // 잠금 해제 완료 → 바로 오디오 포함 재생
        video.muted = false;
        video.volume = 1.0;
        video.play().catch(err => {
          console.warn('[AR] 재생 실패, muted fallback:', err);
          video.muted = true;
          video.play();
        });
      } else {
        // 잠금 해제 전 → muted로 먼저 재생 시작 후 음소거 해제
        video.muted = true;
        video.play().then(() => {
          // 재생 중 상태에서 음소거 해제 (이미 play()가 성공했으므로 안전)
          video.muted = false;
          video.volume = 1.0;
          audioUnlocked = true;
          console.log('[AR] 타겟 인식으로 오디오 잠금 해제 + 재생');
        }).catch(err => {
          console.warn('[AR] 재생 실패:', err);
        });
      }
    };

    // 첫 터치 시 백그라운드에서 오디오 잠금 해제 준비
    ['touchstart', 'mousedown', 'pointerdown'].forEach(evt => {
      document.addEventListener(evt, () => {
        const video = document.getElementById('alpha-video');
        if (!audioUnlocked) unlockAudio(video);
      }, { once: true });
    });
  </script>
</body>
</html>
