<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta charset="UTF-8">
  <title>한복 입은 소녀의 새해 인사</title>

  <script src="./../xr_st/8frame-1.4.1.min.js"></script>
  <script src="./aframe-chromakey-material.min.js"></script>
  <script src="./../xr_st/landing-page.js"></script>

  <script src="./../xr_st/xrextras.js"></script>
  <script async src="./../xr_st/xr.js" data-preload-chunks="slam"></script>
  <script type="module" src="./app.js" defer></script>
  <script src="./target-sound.js"></script>

</head>

<body>

  <a-scene
    xrextras-gesture-detector
    landing-page
    xrextras-loading
    xrextras-runtime-error
    config-targets="targets: ai-girl-ar"
    xrweb="disableWorldTracking: true; allowedDevices: any">

    <a-assets>
        <a-asset-item id="balloon" src="./assets/lego_man.glb"></a-asset-item>
    </a-assets>

    <a-camera
      position="0 4 10"
      raycaster="objects: .cantap"
      cursor="fuse: false; rayOrigin: mouse;">
    </a-camera>

    <a-light type="directional" intensity="0.5" position="1 1 1"></a-light>
    <a-light type="ambient" intensity="1"></a-light>

    <a-entity smart-target="name: ai-girl-ar">
       <a-entity
           id="model"
           gltf-model="#balloon"
           class="cantap"
           xrextras-hold-drag
           xrextras-two-finger-rotate
           xrextras-pinch-scale
           scale="3 3 3"
           shadow="receive: false">
       </a-entity>
    </a-entity>

  </a-scene>

  <!--script>
    // ── safe-vr-fix ───────────────────────────────────────────
    AFRAME.registerComponent('safe-vr-fix', {
      init: function () {
        const sceneEl = this.el.sceneEl;
        if (sceneEl.enterVRButton) {
          const origUpdate = sceneEl.enterVRButton.updateEnterInterfaces;
          sceneEl.enterVRButton.updateEnterInterfaces = function () {
            if (origUpdate) origUpdate.apply(this, arguments);
          };
        }
      }
    });
  </script-->
</body>
</html>
