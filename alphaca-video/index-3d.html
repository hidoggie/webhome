<!doctype html>
<html  lang="ko">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta charset="UTF-8">
  <title>이미지 Target - 3D 띄우기</title>

  <script src="./../xr_st/8frame-1.4.1.min.js"></script>
  <script src="./../xr_st/xrextras.js"></script>
  <script src="./../xr_st/landing-page.js"></script>  
  
  <script async src="./../xr_st/xr.js" data-preload-chunks="slam"></script>

  <script type="module" src="./app.js"></script>

  <script>
     const onxrloaded = async () => {
        const res = await fetch('./image-targets/aigirl-target.json')
        const json = await res.json()
        XR8.XrController.configure({
          imageTargetData: [json],
        })  
     }
     window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded)

  </script>
</head>

<body>

<a-scene
  landing-page
  xrextras-loading
  xrextras-runtime-error
  config-targets=
    "targets: ai-girl-ar"
  xrweb="disableWorldTracking: true">
  <a-camera
    position="0 4 10"
    raycaster="objects: .cantap"
    cursor="fuse: false; rayOrigin: mouse;">
  </a-camera>

    <a-light type="directional" intensity="0.5" position="1 1 1"></a-light>
    <a-light type="ambient" intensity="1"></a-light>

    <a-entity smart-target="name: ai-girl-ar">
       <a-entity
           id="model"
           gltf-model="#balloon"
           class="cantap"
           scale="3 3 3"
           shadow="receive: false">
       </a-entity>
    </a-entity>
    <a-light type="directional" intensity="0.5" position="1 1 1"></a-light>
    <a-light type="ambient" intensity="1"></a-light>

  </a-scene>

</body>
</html>
