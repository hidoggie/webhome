<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="8thwall:package" content="@8thwall.xrextras" />
    <title>Sky Effects</title>

    <script src="./../xr_st/8frame-1.4.1.min.js"></script>
    <script src="./../xr_st/xrextras.js"></script>
    <script src='./../xr_st/landing-page.js'></script>
    <script src='./../xr_st/coaching-overlay.js'></script>

    <script async src="./../xr_st/xr.js" data-preload-chunks="slam"></script>
    <script src="//cdn.8thwall.com/web/aframe/aframe-extras-7.2.0.min.js"></script>
    <script src="./dat.gui.min.js"></script>
    <script src="./sky-recenter.js"></script>

    <script type="module" src="./app.js" defer></script>

  </head>

  <body>
    <a-scene 
        xrextras-tap-recenter
        xrextras-gesture-detector
        xrextras-loading
        xrextras-runtime-error
        landing-page
        sky-coaching-overlay
        sky-recenter
        renderer="colorManagement: true"
        xrlayers
        xrconfig
        xrweb="allowedDevices: any"
        device-orientation>
        
      <a-assets>
        <video id="alpha-video" src="./assets/alpaca.mp4" muted loop></video>
        <img id="skyTexture" src='./space.png'>
      </a-assets>

        <a-camera position="0 3 0"></a-camera>
        
        <a-entity xrlayerscene="name: sky; edgeSmoothness: 0.6">
            <a-sky material="src: #skyTexture; transparent: true; opacity: 1;"></a-sky>

           <a-plane
              width="1.78"
              position="0 0.915 0"
              scale="3 3 3"
              chromakey-video="src: #alpha-video"></a-plane>

          <a-plane
              height="2000"
              width="2000"
              rotation="-90 0 0"
              material="shader: shadow; opacity: 0.67"
              shadow>
          </a-plane>


            <a-entity
               id="model"
               gltf-model="#legoModel"
               position="1 2 -10"
               scale="3 3 3"
               shadow="receive: false"
               animation-mixer>
            </a-entity>

            <a-entity light="type: ambient; intensity: 1;"></a-entity>
    <a-entity
      id="skyLight"
      light="
        type: directional;
        intensity: 0.8;
        castShadow: true;
        shadowMapHeight: 2048;
        shadowMapWidth: 2048;
        shadowCameraTop: 10;
        shadowCameraBottom: -10;
        shadowCameraRight: 10;
        shadowCameraLeft: -10;
        target: #skyBalloon;
        shadowRadius: 10;"
      position="1 4.3 2.5"
      xrextras-attach="target: skyBalloon; offset: 8 8 4"
      shadow>
    </a-entity>
        </sky-scene>
 <!-- World Effects Scene -->

  <!-- Scene Camera for Sky Effects and World Effects Scenes -->
  <a-camera id="camera" wasd-controls-enabled="false" position="0 3 0"></a-camera>

  <!-- Ambient and Directional Light with shadows for the World Scene (consistent with sky scene lighting) -->
  <a-entity light="type: ambient; intensity: 0.75;"></a-entity>
  <a-entity
    id="light"
    light="
      type: directional;
      intensity: 0.8;
      castShadow: true;
      shadowMapHeight: 2048;
      shadowMapWidth: 2048;
      shadowCameraTop: 10;
      shadowCameraBottom: -10;
      shadowCameraRight: 10;
      shadowCameraLeft: -10;
      target: #camera;
      shadowRadius: 10;"
    position="1 4.3 2.5"
    xrextras-attach="target: camera; offset: 8 8 4"
    shadow>
  </a-entity>

  <!-- Ground Plane to catch shadows -->
  <a-box
    id="ground"
    scale="2000 2 2000"
    position="0 0 0"
    material="shader: shadow; transparent: true; opacity: 0.4"
    shadow>
  </a-box>

    </a-scene>
  </body>

</html>
