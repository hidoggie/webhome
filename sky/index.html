<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8">
    <title>Sky Effects</title>

    <script src="./../xr_st/8frame-1.5.0.min.js"></script>
    <script src="./../xr_st/xrextras.js"></script>
    <script src='./../xr_st/landing-page.js'></script>
    <script src='./../xr_st/coaching-overlay.js'></script>
    <script src="./../xr_st/aframe-extras-6.1.1.min.js"></script>

    <script async src="./../xr_st/xr.js" data-preload-chunks="slam"></script>

    <script src="./sky-recenter.js"></script>
  </head>

  <body>
    <a-scene 
        landing-page
        xrextras-loading
        xrextras-runtime-error
        sky-coaching-overlay
        sky-recenter
        renderer="colorManagement: true"
        xrlayers="cameraDirection: back;"
        xrconfig
        device-orientation>
        
      <a-assets>
        <a-asset-item id="legoModel" src="./lego_man.glb"></a-asset-item>
        <img id="skyTexture" src="./space.png" />
      </a-assets>

        <!--a-camera position="0 3 0"></a-camera-->
       <a-camera id="camera" wasd-controls-enabled="false" near="0.1" position="0 0 0"></a-camera>
        
        <a-entity     
           id="skyScene"
           xrlayerscene="name: sky; invertLayerMask:false; edgeSmoothness: 0.6">

            <a-sky material="src: #skyTexture; transparent: true; opacity: 1;"></a-sky>

            <a-entity
               id="model"
               gltf-model="#legoModel"
               position="0 0 0"
               scale=".02 .02 .02"
               rotation="0 0 0"
               animation-mixer="clip: idle; loop: repeat;"
               visible="false"
               hide-show>
            </a-entity>
            <a-entity light="type: ambient; intensity: 1;"></a-entity>
        </a-entity>
    </a-scene>
  </body>
</html>
