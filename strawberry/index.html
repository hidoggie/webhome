<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>catch trigger</title>

  <script src="./../xr_st/8frame-1.4.1.min.js"></script>
  <script src="./../xr_st/xrextras.js"></script>
  <script src="./../xr_st/landing-page.js"></script>  

  <script src="https://unpkg.com/aframe-particle-system-component@1.0.x/dist/aframe-particle-system-component.min.js"></script> 

  <script src="//cdn.8thwall.com/web/aframe/aframe-animation-component-5.1.2.min.js"></script>  

  <script async src="./../xr_st/xr.js" data-preload-chunks="slam"></script>
  <script type="module" src="./app.js" defer></script>
  
</head>

<body>

<style>
#scoreBox {
  background-color: #FFA500;
  position: absolute;
  top: 20px;
  left: 20px;
  width: 320px;
  height: 100px;
  z-index: 9999;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 20pt;
  border: 3px dotted;
}
</style>


<a-scene
game-state
  spice-spawner
  gesture-detector
  xrextras-almost-there
  xrextras-loading
  xrextras-runtime-error
  xrweb>

  <!-- We can define assets here to be loaded when A-Frame initializes -->
  <a-assets>
    <!-- Credit to Poly by Google for the model: https://poly.google.com/view/5ZMAz7_ucTn -->
    <!--a-asset-item id="sandCastleModel" src="assets/sand-castle.glb"></a-asset-item-->
    <!--https://poly.google.com/view/bn33F2RDgGD-->
    <a-asset-item id="pumpkin" src="assets/strawberry.glb"></a-asset-item>
    <a-asset-item id="farmer" src="assets/farmer.glb"></a-asset-item>
  </a-assets>

  <!-- The raycaster will emit mouse events on scene objects specified with the cantap class -->
  <a-camera
    id="camera"
    position="0 8 8"
    raycaster="objects: .cantap"
    cursor="fuse: false; rayOrigin: mouse;">
  </a-camera>

  <a-light type="ambient" intensity="0.7"></a-light>
  
  <!--<a-plane height="10" width="10" color="#22cc22" rotation="-90 0 0" position="0 -1 0"></a-plane>-->

  <a-entity
    light="
      type: directional;
      intensity: 0.8;
      castShadow: true;
      shadowMapHeight:2048;
      shadowMapWidth:2048;
      shadowCameraTop: 10;
      target: #model;"
    xrextras-attach="target: model; offset: 1 15 3;"
    shadow>
  </a-entity>

  <a-entity 
    id="model" 
    gltf-model="#pumpkin" 
    class="cantap pumpkin" 
    hold-drag 
    two-finger-spin 
    scale="1.5 1.5 1.5" 
    shadow="receive: false">
  </a-entity>

  <a-entity 
    id="model" 
    gltf-model="#pumpkin" 
    class="cantap pumpkin" 
    hold-drag 
    two-finger-spin 
    position="4 0 2"
    scale="1.5 1.5 1.5" 
    shadow="receive: false">
  </a-entity>
  
 <a-entity 
    id="model" 
    gltf-model="#farmer" 
    class="cantap" 
    hold-drag 
    two-finger-spin 
    pinch-scale 
    scale="0.05 0.05 0.05" 
    shadow="receive: false">
  </a-entity>

  <a-plane
    id="ground" 
    rotation="-90 0 0" 
    width="1000" 
    height="1000" 
    material="shader: shadow" 
    shadow>
  </a-plane>
</a-scene>

<div id=scoreBox>
  Spices: <span id=scoreAmount>0</span>
</div>
</body>
</html>
