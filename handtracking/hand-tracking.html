<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Tracking AR - 가상 액세서리 체험</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖐️</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #000;
        }
        
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        
        #output-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            pointer-events: none;
        }
        
        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            pointer-events: none;
        }
        
        /* 새로운 하단 UI 스타일 */
        #bottom-ui {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 10;
            width: 100%;
        }

        #icon-menu {
            display: flex;
            gap: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 25px;
            border-radius: 40px;
            backdrop-filter: blur(10px);
        }
        
        .icon-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            font-size: 30px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        
        .icon-btn:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.2);
        }
        
        .icon-btn.active {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.6);
            transform: scale(1.1);
        }
        
        #instructions {
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 25px;
            border-radius: 20px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            letter-spacing: 0.5px;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            text-align: center;
            z-index: 100;
            background: rgba(0,0,0,0.8);
            padding: 30px;
            border-radius: 15px;
        }
        
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="video" autoplay playsinline></video>
        <canvas id="output-canvas"></canvas>
        <canvas id="webgl-canvas"></canvas>
        
        <div id="bottom-ui">
            <div id="icon-menu">
                <button class="icon-btn active" data-mode="ring" title="반지">💍</button>
                <button class="icon-btn" data-mode="bracelet" title="팔찌">📿</button>
                <button class="icon-btn" data-mode="ball" title="공">⚽</button>
                <button class="icon-btn" data-mode="watch" title="시계">⌚</button>
            </div>
            <div id="instructions">카메라 앞에 손을 내밀어 액세서리를 체험하세요</div>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div id="loading-text">시스템 초기화 중...</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script>
        // 전역 변수
        let camera, scene, renderer;
        let handObjects = { 
            left: { ring: null, bracelet: null, ball: null, watch: null }, 
            right: { ring: null, bracelet: null, ball: null, watch: null } 
        };
        let currentMode = 'ring';
        let videoElement, outputCanvas, webglCanvas, canvasCtx;
        let hands;
        let gltfLoader;
        
        // 에셋 경로 설정
        const modelPaths = {
            ring: 'assets/ring.glb',
            bracelet: 'assets/bracelet.glb',
            ball: 'assets/ball.glb',
            watch: 'assets/watch.glb'
        };
        
        // 로딩 상태 추적
        let modelsLoadedCount = 0;
        const totalModels = Object.keys(modelPaths).length;

        // 손 감지 상태 추적
        let handDetectionState = { left: false, right: false };
        
        // 손 랜드마크 인덱스
        const LANDMARKS = {
            WRIST: 0,
            THUMB_TIP: 4,
            INDEX_TIP: 8,
            MIDDLE_TIP: 12,
            RING_TIP: 16,
            PINKY_TIP: 20,
            INDEX_MCP: 5,
            MIDDLE_MCP: 9,
            RING_MCP: 13,
            PINKY_MCP: 17
        };
        
        // 초기화
        function init() {
            videoElement = document.getElementById('video');
            outputCanvas = document.getElementById('output-canvas');
            webglCanvas = document.getElementById('webgl-canvas');
            canvasCtx = outputCanvas.getContext('2d');
            
            gltfLoader = new THREE.GLTFLoader();
            
            setupThreeJS();
            setupMediaPipe();
            setupEventListeners();
        }
        
        // Three.js 설정
        function setupThreeJS() {
            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(63, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            
            renderer = new THREE.WebGLRenderer({ 
                canvas: webglCanvas, 
                alpha: true,
                antialias: true,
                precision: 'highp'
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0x000000, 0);
            
            // 조명 설정
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            
            const directionalLight1 = new THREE.DirectionalLight(0xffffff, 0.6);
            directionalLight1.position.set(5, 5, 5);
            scene.add(directionalLight1);
            
            const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
            directionalLight2.position.set(-5, -5, 5);
            scene.add(directionalLight2);
            
            loadGLBModels();
            
            window.addEventListener('resize', onWindowResize);
        }
        
        // 에셋 경로에서 GLB 모델 로드
        function loadGLBModels() {
            document.getElementById('loading-text').innerText = '3D 모델 로딩 중...';
            
            Object.keys(modelPaths).forEach(mode => {
                gltfLoader.load(modelPaths[mode], (gltf) => {
                    const model = gltf.scene;
                    
                    // 모델 크기 정규화 (보이는 크기가 너무 크거나 작지 않게 방어 코드 작성)
                    const box = new THREE.Box3().setFromObject(model);
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    
                    // ※ 중요: 실제 준비하신 glb 파일의 스케일에 따라 아래 숫자를 조절하셔야 할 수 있습니다.
                    let scale = 0.3 / maxDim; 
                    if (mode === 'ring') scale = 0.1 / maxDim; // 반지는 보통 더 작게 세팅
                    
                    model.scale.set(scale, scale, scale);
                    
                    // 좌/우 양손을 위해 모델을 클론하여 저장
                    handObjects.left[mode] = model.clone();
                    handObjects.right[mode] = model.clone();
                    
                    handObjects.left[mode].visible = false;
                    handObjects.right[mode].visible = false;
                    
                    scene.add(handObjects.left[mode]);
                    scene.add(handObjects.right[mode]);
                    
                    modelsLoadedCount++;
                    checkLoadingComplete();
                }, undefined, (error) => {
                    console.error(`${mode} 모델 로드 실패:`, error);
                    // 실패해도 진행은 되도록 카운트 증가
                    modelsLoadedCount++;
                    checkLoadingComplete();
                });
            });
        }

        function checkLoadingComplete() {
            if (modelsLoadedCount === totalModels) {
                updateAccessoryVisibility();
                document.getElementById('loading-text').innerText = '카메라 준비 중...';
            }
        }
        
        // 액세서리 가시성 업데이트
        function updateAccessoryVisibility() {
            ['left', 'right'].forEach(hand => {
                Object.keys(handObjects[hand]).forEach(mode => {
                    const obj = handObjects[hand][mode];
                    if (obj) {
                        obj.visible = (mode === currentMode) && handDetectionState[hand];
                    }
                });
            });
        }
        
        // MediaPipe 설정
        function setupMediaPipe() {
            hands = new Hands({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }
            });
            
            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7
            });
            
            hands.onResults(onResults);
            
            const cameraInstance = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({ image: videoElement });
                },
                width: 1280,
                height: 720
            });
            
            cameraInstance.start().then(() => {
                // 카메라 권한 승인 및 시작 시 로딩창 숨김
                document.getElementById('loading').style.display = 'none';
            });
        }
        
        // 손 추적 결과 처리
        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, outputCanvas.width, outputCanvas.height);
            
            handDetectionState.left = false;
            handDetectionState.right = false;
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    const handedness = results.multiHandedness[i].label.toLowerCase();
                    
                    handDetectionState[handedness] = true;
                    updateHandObject(landmarks, handedness);
                }
            }
            
            updateAccessoryVisibility();
            canvasCtx.restore();
            renderer.render(scene, camera);
        }
        
        // 손 객체 위치/회전 업데이트
        function updateHandObject(landmarks, handedness) {
            const handObj = handObjects[handedness][currentMode];
            if (!handObj) return;
            
            switch (currentMode) {
                case 'ring':
                    const ringBase = landmarks[LANDMARKS.RING_MCP];
                    const ringTip = landmarks[LANDMARKS.RING_TIP];
                    const ringPos = {
                        x: (ringBase.x + ringTip.x) / 2,
                        y: (ringBase.y + ringTip.y) / 2,
                        z: (ringBase.z + ringTip.z) / 2
                    };
                    updateObjectPosition(handObj, ringPos, handedness);
                    
                    const ringDir = new THREE.Vector3(
                        ringTip.x - ringBase.x,
                        ringTip.y - ringBase.y,
                        ringTip.z - ringBase.z
                    ).normalize();
                    handObj.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), ringDir);
                    break;
                    
                case 'bracelet':
                    const wrist = landmarks[LANDMARKS.WRIST];
                    updateObjectPosition(handObj, wrist, handedness);
                    
                    const indexMCP = landmarks[LANDMARKS.INDEX_MCP];
                    const braceletDir = new THREE.Vector3(
                        indexMCP.x - wrist.x,
                        indexMCP.y - wrist.y,
                        indexMCP.z - wrist.z
                    ).normalize();
                    handObj.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), braceletDir);
                    break;
                    
                case 'ball':
                    const indexTip = landmarks[LANDMARKS.INDEX_TIP];
                    const thumbTip = landmarks[LANDMARKS.THUMB_TIP];
                    
                    const palmCenter = {
                        x: (indexTip.x + thumbTip.x) / 2,
                        y: (indexTip.y + thumbTip.y) / 2,
                        z: (indexTip.z + thumbTip.z) / 2
                    };
                    updateObjectPosition(handObj, palmCenter, handedness);
                    break;
                    
                case 'watch':
                    const watchWrist = landmarks[LANDMARKS.WRIST];
                    const watchIndexMCP = landmarks[LANDMARKS.INDEX_MCP];
                    updateObjectPosition(handObj, watchWrist, handedness);
                    
                    const watchDir = new THREE.Vector3(
                        watchIndexMCP.x - watchWrist.x,
                        watchIndexMCP.y - watchWrist.y,
                        watchIndexMCP.z - watchWrist.z
                    ).normalize();
                    handObj.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), watchDir);
                    break;
            }
        }
        
        // 화면 좌표를 3D 좌표로 변환
        function updateObjectPosition(obj, landmark, handedness) {
            const x = (landmark.x - 0.5) * 8;
            const y = -(landmark.y - 0.5) * 8;
            const z = -landmark.z * 8;
            obj.position.set(handedness === 'left' ? -x : x, y, z);
        }
        
        // 하단 아이콘 이벤트 리스너
        function setupEventListeners() {
            const buttons = document.querySelectorAll('.icon-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentMode = btn.dataset.mode;
                    updateAccessoryVisibility();
                });
            });
        }
        
        // 창 크기 조정
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            outputCanvas.width = window.innerWidth;
            outputCanvas.height = window.innerHeight;
        }
        
        init();
    </script>
</body>
</html>
