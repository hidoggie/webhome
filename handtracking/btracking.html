<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body Tracking AR - 몸 중앙 공 올리기</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; background: #000; color: #fff; }
        
        #container { position: relative; width: 100vw; height: 100vh; }
        
        /* 거울 모드: 화면에 보이는 요소들만 시각적으로 좌우 반전 처리 */
        .mirrored #video, .mirrored #webgl-canvas, .mirrored #skeleton-canvas { transform: scaleX(-1); }
        
        #video, #webgl-canvas, #skeleton-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            pointer-events: none;
        }
        
        #composite-canvas { display: none; } /* 최종 사진/녹화 굽기용 캔버스 */

        #top-ui {
            position: absolute; top: 20px; right: 20px; z-index: 10;
            display: flex; flex-direction: column; gap: 10px;
        }
        .icon-btn {
            width: 50px; height: 50px; border-radius: 50%; border: none;
            background: rgba(0, 0, 0, 0.5); color: white; font-size: 24px;
            cursor: pointer; backdrop-filter: blur(5px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .icon-btn:hover { background: rgba(255, 255, 255, 0.2); }
        .icon-btn:active { transform: scale(0.95); }

        #bottom-ui {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 10;
        }
        
        #shutter-btn {
            width: 70px; height: 70px; border-radius: 50%;
            background: white; border: 4px solid rgba(0,0,0,0.2);
            cursor: pointer; transition: all 0.2s;
            box-shadow: 0 0 0 4px rgba(255,255,255,0.4);
            display: flex; justify-content: center; align-items: center;
        }
        #shutter-btn:active { transform: scale(0.9); }
        
        #shutter-btn.recording {
            background: #ff4444; border-color: rgba(255,0,0,0.3);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); }
        }

        #instructions {
            background: rgba(0, 0, 0, 0.6); padding: 8px 16px; border-radius: 20px;
            font-size: 14px; backdrop-filter: blur(5px); text-align: center;
        }

        #preview-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column;
            justify-content: center; align-items: center;
        }
        #preview-media-container {
            max-width: 90%; max-height: 70vh;
        }
        #preview-content {
            max-width: 100%; max-height: 70vh; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .modal-btns { display: flex; gap: 15px; margin-top: 20px; }
        .action-btn {
            padding: 10px 25px; border-radius: 25px; border: none; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
        .action-btn:hover { opacity: 0.8; transform: translateY(-2px); }
        .action-btn:active { transform: translateY(0); }
        .btn-download { background: #4CAF50; color: white; }
        .btn-share { background: #2196F3; color: white; }
        .btn-close { background: #f44336; color: white; }

        .loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); padding: 30px; border-radius: 15px; text-align: center; z-index: 50;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white;
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="container" class="mirrored">
        <video id="video" autoplay playsinline></video>
        <canvas id="skeleton-canvas"></canvas>
        <canvas id="webgl-canvas"></canvas>
        <canvas id="composite-canvas"></canvas>
        
        <div id="top-ui">
            <button class="icon-btn" id="switch-camera-btn" title="카메라 전환">🔄</button>
            <button class="icon-btn" id="toggle-skeleton-btn" title="스켈레톤 표시/숨김">🦴</button>
        </div>
        
        <div id="bottom-ui">
            <div id="shutter-btn" title="탭: 사진 / 길게: 동영상"></div>
            <div id="instructions">전신이 보이도록 카메라 앞에 서세요<br>탭: 사진 / 길게 누르기: 동영상</div>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div id="loading-text">초기화 중...</div>
        </div>
    </div>

    <div id="preview-modal">
        <div id="preview-media-container"></div>
        <div class="modal-btns">
            <button class="action-btn btn-download" id="download-btn">💾 저장</button>
            <button class="action-btn btn-share" id="share-btn">📤 공유</button>
            <button class="action-btn btn-close" id="close-modal-btn">❌ 닫기</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

    <script>
        let camera, scene, renderer;
        let videoElement, webglCanvas, skeletonCanvas, compositeCanvas;
        let pose;
        let isFrontCamera = true;
        let videoStream = null;
        let showSkeleton = true;
        
        // 💡 3D 공 객체 저장용 변수
        let ballModel = null;
        let isModelLoaded = false;

        let pressTimer;
        let isRecording = false;
        let mediaRecorder;
        let recordedChunks = [];
        let previewBlobUrl = null;
        let isVideoPreview = false;
        let isPressingShutter = false;
        let videoMimeType = 'video/webm; codecs=vp9';
        let videoExtension = 'webm';

        function init() {
            videoElement = document.getElementById('video');
            webglCanvas = document.getElementById('webgl-canvas');
            skeletonCanvas = document.getElementById('skeleton-canvas');
            compositeCanvas = document.getElementById('composite-canvas');
            
            skeletonCanvas.width = window.innerWidth;
            skeletonCanvas.height = window.innerHeight;

            setupThreeJS();
            setupMediaPipe();
            startCamera();
            setupEventListeners();
        }
        
        function setupThreeJS() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(63, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            
            renderer = new THREE.WebGLRenderer({ 
                canvas: webglCanvas, 
                alpha: true,
                antialias: true,
                preserveDrawingBuffer: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0x000000, 0);
            
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(5, 5, 5);
            scene.add(dirLight);

            createBodyModels();
            animate();
        }
        
        function createBodyModels() {
            // 💡 수정 2: 토러스 대신 ball.glb 파일을 불러오도록 수정
            const gltfLoader = new THREE.GLTFLoader();
            document.getElementById('loading-text').innerText = '3D 공 모델 로딩 중...';
            
            gltfLoader.load('assets/ball.glb', (gltf) => {
                const model = gltf.scene;
                
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                
                let scale = 1.8 / maxDim; // 공 크기 조절 (화면에 맞게)
                model.scale.set(scale, scale, scale);
                
                const wrapperGroup = new THREE.Group();
                wrapperGroup.add(model);
                wrapperGroup.visible = false; // 기본적으로 숨김
                
                ballModel = wrapperGroup;
                scene.add(ballModel);
                isModelLoaded = true;
                
                document.getElementById('loading-text').innerText = '카메라 준비 중...';
            }, undefined, (error) => {
                console.error("공 모델 로드 실패:", error);
                document.getElementById('loading-text').innerText = '모델 로드 실패';
            });
        }
        
        function setupMediaPipe() {
            pose = new Pose({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;
                }
            });
            
            pose.setOptions({
                modelComplexity: 1,
                smoothLandmarks: true,
                enableSegmentation: false,
                smoothSegmentation: false,
                minDetectionConfidence: 0.6,
                minTrackingConfidence: 0.6
            });
            
            pose.onResults(onPoseResults);
        }
        
        async function startCamera() {
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
            }
            
            try {
                const constraints = {
                    video: {
                        facingMode: isFrontCamera ? 'user' : 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                };
                
                videoStream = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = videoStream;
                
                document.getElementById('container').className = isFrontCamera ? 'mirrored' : '';

                await new Promise(resolve => {
                    videoElement.onloadedmetadata = () => {
                        videoElement.play();
                        resolve();
                    };
                });
                
                document.getElementById('loading').style.display = 'none';
                processVideo();
                
            } catch (error) {
                console.error('카메라 접근 오류:', error);
                document.getElementById('loading-text').innerText = '카메라 접근 실패: ' + error.message;
            }
        }
        
        async function processVideo() {
            if (!videoElement.paused && !videoElement.ended) {
                await pose.send({ image: videoElement });
            }
            requestAnimationFrame(processVideo);
        }
        
        function onPoseResults(results) {
            if (results.poseLandmarks) {
                updateBodyModels(results.poseLandmarks);
                
                if (showSkeleton) {
                    drawSkeleton(results);
                } else {
                    const ctx = skeletonCanvas.getContext('2d');
                    ctx.clearRect(0, 0, skeletonCanvas.width, skeletonCanvas.height);
                }
            } else {
                if (ballModel) ballModel.visible = false;
                const ctx = skeletonCanvas.getContext('2d');
                ctx.clearRect(0, 0, skeletonCanvas.width, skeletonCanvas.height);
            }
        }
        
        function drawSkeleton(results) {
            const ctx = skeletonCanvas.getContext('2d');
            if (!ctx) return;
            
            ctx.save();
            ctx.clearRect(0, 0, skeletonCanvas.width, skeletonCanvas.height);
            
            // 💡 수정 3: JS에서 반대 방향으로 뒤집던 ctx.scale(-1, 1) 로직 제거! 
            // 이미 CSS 클래스(.mirrored)가 캔버스를 거울처럼 통째로 뒤집어주고 있기 때문에 이중으로 뒤집을 필요가 없습니다.
            
            if (results.poseLandmarks) {
                drawConnectors(ctx, results.poseLandmarks, POSE_CONNECTIONS, {
                    color: '#00ff00',
                    lineWidth: 4
                });
                drawLandmarks(ctx, results.poseLandmarks, {
                    color: '#ff0000',
                    fillColor: '#ffffff',
                    lineWidth: 2,
                    radius: 6
                });
            }
            
            ctx.restore();
        }
        
        function updateBodyModels(landmarks) {
            if (!isModelLoaded || !ballModel) return;

            const lShoulder = landmarks[11];
            const rShoulder = landmarks[12];
            const lHip = landmarks[23];
            const rHip = landmarks[24];
            
            if (lShoulder && rShoulder && lHip && rHip &&
                lShoulder.visibility > 0.6 && rShoulder.visibility > 0.6) {
                
                const centerX = (lShoulder.x + rShoulder.x + lHip.x + rHip.x) / 4;
                const centerY = (lShoulder.y + rShoulder.y + lHip.y + rHip.y) / 4;
                const centerZ = (lShoulder.z + rShoulder.z + lHip.z + rHip.z) / 4;

                const multiplier = 10;
                
                // 💡 수정 3: JS에서 X좌표를 억지로 뒤집던 로직 제거! CSS와 완벽히 동기화됩니다.
                let x = (centerX - 0.5) * multiplier; 
                let y = -(centerY - 0.5) * multiplier;
                const z = -centerZ * multiplier;
                
                ballModel.position.set(x, y, z);
                ballModel.visible = true; 
                
                // 공 자체의 회전 애니메이션
                ballModel.rotation.y += 0.02;
                ballModel.rotation.x += 0.01;
            } else {
                ballModel.visible = false;
            }
        }
        
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        
        function drawToComposite() {
            compositeCanvas.width = videoElement.videoWidth;
            compositeCanvas.height = videoElement.videoHeight;
            const ctx = compositeCanvas.getContext('2d');
            
            // 파일로 다운로드될 때는 진짜로 이미지를 뒤집어 구워내야 하므로 여기는 거울 모드를 유지합니다.
            if (isFrontCamera) {
                ctx.translate(compositeCanvas.width, 0);
                ctx.scale(-1, 1);
            }
            
            ctx.drawImage(videoElement, 0, 0, compositeCanvas.width, compositeCanvas.height);
            
            if (showSkeleton) {
                ctx.drawImage(skeletonCanvas, 0, 0, compositeCanvas.width, compositeCanvas.height);
            }
            ctx.drawImage(webglCanvas, 0, 0, compositeCanvas.width, compositeCanvas.height);
            
            if (isFrontCamera) {
                ctx.setTransform(1, 0, 0, 1, 0, 0); 
            }
        }

        function takePhoto() {
            drawToComposite();
            if (previewBlobUrl) {
                URL.revokeObjectURL(previewBlobUrl);
            }
            previewBlobUrl = compositeCanvas.toDataURL('image/jpeg', 0.9);
            isVideoPreview = false;
            showPreview();
        }

        function startRecording() {
            isRecording = true;
            document.getElementById('shutter-btn').classList.add('recording');
            recordedChunks = [];
            
            const recordLoop = () => {
                if (isRecording) {
                    drawToComposite();
                    requestAnimationFrame(recordLoop);
                }
            };
            recordLoop();
            
            const stream = compositeCanvas.captureStream(30);
            
            if (MediaRecorder.isTypeSupported('video/mp4')) {
                videoMimeType = 'video/mp4';
                videoExtension = 'mp4';
            } else if (MediaRecorder.isTypeSupported('video/webm; codecs=h264')) {
                videoMimeType = 'video/webm; codecs=h264';
                videoExtension = 'webm';
            } else if (!MediaRecorder.isTypeSupported('video/webm; codecs=vp9')) {
                videoMimeType = 'video/webm';
                videoExtension = 'webm';
            }

            mediaRecorder = new MediaRecorder(stream, { mimeType: videoMimeType });
            
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };
            
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: videoMimeType });
                if (previewBlobUrl && isVideoPreview) {
                    URL.revokeObjectURL(previewBlobUrl);
                }
                previewBlobUrl = URL.createObjectURL(blob);
                isVideoPreview = true;
                showPreview();
            };
            
            mediaRecorder.start();
        }

        function stopRecording() {
            if (!isRecording || !mediaRecorder) return;
            isRecording = false;
            document.getElementById('shutter-btn').classList.remove('recording');
            mediaRecorder.stop();
        }

        function setupEventListeners() {
            const btnCamera = document.getElementById('switch-camera-btn');
            btnCamera.addEventListener('click', async () => {
                isFrontCamera = !isFrontCamera;
                document.getElementById('loading').style.display = 'block';
                document.getElementById('loading-text').innerText = '카메라 전환 중...';
                await startCamera();
            });
            
            const btnSkeleton = document.getElementById('toggle-skeleton-btn');
            btnSkeleton.addEventListener('click', () => {
                showSkeleton = !showSkeleton;
                if (!showSkeleton) {
                    const ctx = skeletonCanvas.getContext('2d');
                    ctx.clearRect(0, 0, skeletonCanvas.width, skeletonCanvas.height);
                }
            });

            const shutterBtn = document.getElementById('shutter-btn');
            
            const handlePressStart = (e) => {
                e.preventDefault();
                isPressingShutter = true;
                pressTimer = setTimeout(() => {
                    if (isPressingShutter) startRecording();
                }, 500);
            };
            
            const handlePressEnd = (e) => {
                if (!isPressingShutter) return;
                
                e.preventDefault();
                isPressingShutter = false;
                clearTimeout(pressTimer);
                
                if (isRecording) {
                    stopRecording();
                } else {
                    takePhoto();
                }
            };

            shutterBtn.addEventListener('mousedown', handlePressStart);
            shutterBtn.addEventListener('touchstart', handlePressStart, {passive: false});
            
            window.addEventListener('mouseup', handlePressEnd);
            window.addEventListener('touchend', handlePressEnd);

            document.getElementById('close-modal-btn').addEventListener('click', () => {
                const modal = document.getElementById('preview-modal');
                modal.style.display = 'none';
                
                const container = document.getElementById('preview-media-container');
                container.innerHTML = '';
            });

            document.getElementById('download-btn').addEventListener('click', () => {
                if (!previewBlobUrl) return;

                // 💡 수정 1: 저장을 한 번 더 물어보는 확인창 추가 (안드로이드 중복 다운로드 방지)
                if (!confirm('파일을 기기에 저장하시겠습니까?')) {
                    return; 
                }
                
                const a = document.createElement('a');
                a.href = previewBlobUrl;
                a.download = isVideoPreview ? `body-ar-video-${Date.now()}.${videoExtension}` : `body-ar-photo-${Date.now()}.jpg`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            });

            document.getElementById('share-btn').addEventListener('click', async () => {
                if (!previewBlobUrl) return;
                
                if (!navigator.share && !navigator.canShare) {
                    alert('현재 브라우저에서는 공유 기능을 지원하지 않습니다.');
                    return;
                }
                
                try {
                    let file;
                    if (isVideoPreview) {
                        const response = await fetch(previewBlobUrl);
                        const blob = await response.blob();
                        file = new File([blob], `body-ar-video.${videoExtension}`, { type: videoMimeType });
                    } else {
                        const response = await fetch(previewBlobUrl);
                        const blob = await response.blob();
                        file = new File([blob], 'body-ar-photo.jpg', { type: 'image/jpeg' });
                    }

                    if (navigator.canShare && !navigator.canShare({ files: [file] })) {
                        alert('이 파일은 공유할 수 없습니다.');
                        return;
                    }

                    await navigator.share({
                        title: 'Body Tracking AR',
                        text: '제가 만든 AR 화면을 확인해보세요!',
                        files: [file]
                    });
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        console.error('공유 실패:', err);
                        alert('공유 중 오류가 발생했습니다: ' + err.message);
                    }
                }
            });
            
            window.addEventListener('resize', onWindowResize);
        }

        function showPreview() {
            const container = document.getElementById('preview-media-container');
            container.innerHTML = '';
            
            if (isVideoPreview) {
                const vid = document.createElement('video');
                vid.src = previewBlobUrl;
                vid.controls = true;
                vid.autoplay = true;
                vid.loop = true;
                vid.id = 'preview-content';
                vid.playsInline = true;
                container.appendChild(vid);
            } else {
                const img = document.createElement('img');
                img.src = previewBlobUrl;
                img.id = 'preview-content';
                container.appendChild(img);
            }
            
            document.getElementById('preview-modal').style.display = 'flex';
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            skeletonCanvas.width = window.innerWidth;
            skeletonCanvas.height = window.innerHeight;
        }
        
        function drawConnectors(ctx, landmarks, connections, style) {
            connections.forEach(([start, end]) => {
                const startPoint = landmarks[start];
                const endPoint = landmarks[end];
                
                if (startPoint && endPoint && startPoint.visibility > 0.5 && endPoint.visibility > 0.5) {
                    ctx.beginPath();
                    ctx.strokeStyle = style.color;
                    ctx.lineWidth = style.lineWidth;
                    ctx.moveTo(startPoint.x * skeletonCanvas.width, startPoint.y * skeletonCanvas.height);
                    ctx.lineTo(endPoint.x * skeletonCanvas.width, endPoint.y * skeletonCanvas.height);
                    ctx.stroke();
                }
            });
        }
        
        function drawLandmarks(ctx, landmarks, style) {
            landmarks.forEach(landmark => {
                if (landmark.visibility > 0.5) {
                    ctx.beginPath();
                    ctx.arc(
                        landmark.x * skeletonCanvas.width,
                        landmark.y * skeletonCanvas.height,
                        style.radius,
                        0,
                        2 * Math.PI
                    );
                    ctx.fillStyle = style.fillColor;
                    ctx.fill();
                    ctx.strokeStyle = style.color;
                    ctx.lineWidth = style.lineWidth;
                    ctx.stroke();
                }
            });
        }
        
        const POSE_CONNECTIONS = [
            [0, 1], [1, 2], [2, 3], [3, 7], [0, 4], [4, 5], [5, 6], [6, 8],
            [9, 10], [11, 12], [11, 13], [13, 15], [15, 17], [15, 19], [15, 21],
            [17, 19], [12, 14], [14, 16], [16, 18], [16, 20], [16, 22], [18, 20],
            [11, 23], [12, 24], [23, 24], [23, 25], [24, 26], [25, 27], [26, 28],
            [27, 29], [28, 30], [29, 31], [30, 32], [27, 31], [28, 32]
        ];

        init();
    </script>
</body>
</html>
