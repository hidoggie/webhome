<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hand Tracking AR - 가상 액세서리 체험 (개선판)</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖐️</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #000;
        }
        
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        
        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        
        #output-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            pointer-events: none;
        }
        
        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
            pointer-events: none;
        }
        
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            color: white;
            z-index: 10;
            max-width: 300px;
        }
        
        h1 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #4CAF50;
        }
        
        .mode-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .mode-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .mode-btn.active {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
        }
        
        #status {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            font-size: 12px;
            line-height: 1.5;
        }
        
        #file-upload {
            margin-top: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }
        
        #file-upload label {
            display: block;
            font-size: 11px;
            margin-bottom: 5px;
            color: #aaa;
        }
        
        #file-upload input[type="file"] {
            width: 100%;
            font-size: 11px;
            color: white;
        }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            text-align: center;
            max-width: 600px;
            z-index: 10;
        }
        
        .instruction-text {
            font-size: 14px;
            margin: 5px 0;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 20px;
            text-align: center;
            z-index: 100;
        }
        
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="video" autoplay playsinline></video>
        <canvas id="output-canvas"></canvas>
        <canvas id="webgl-canvas"></canvas>
        
        <div id="controls">
            <h1>🖐️ Hand Tracking AR</h1>
            <button class="mode-btn active" data-mode="ring">💍 반지 착용</button>
            <button class="mode-btn" data-mode="bracelet">📿 팔찌 착용</button>
            <button class="mode-btn" data-mode="ball">⚽ 공 잡기</button>
            <button class="mode-btn" data-mode="watch">⌚ 시계 착용</button>
            
            <div id="file-upload">
                <label>GLB 모델 업로드 (선택사항):</label>
                <input type="file" id="glb-file" accept=".glb,.gltf" />
            </div>
            
            <div id="status">
                <div>상태: 초기화 중...</div>
                <div>손 감지: 대기 중</div>
            </div>
        </div>
        
        <div id="instructions">
            <div class="instruction-text">✋ 카메라 앞에 손을 보여주세요</div>
            <div class="instruction-text">💡 위 버튼을 눌러 다른 액세서리를 체험하세요</div>
            <div class="instruction-text">📦 GLB 파일을 업로드하여 커스텀 모델 사용 가능</div>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>모델 로딩 중...</div>
        </div>
    </div>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    
    <!-- MediaPipe Hands -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <script>
        // 전역 변수
        let camera, scene, renderer;
        let handObjects = { left: null, right: null };
        let currentMode = 'ring';
        let videoElement, outputCanvas, webglCanvas, canvasCtx;
        let hands;
        let gltfLoader;
        let customModel = null;
        
        // 손 감지 상태 추적
        let handDetectionState = {
            left: false,
            right: false
        };
        
        // 손 랜드마크 인덱스
        const LANDMARKS = {
            WRIST: 0,
            THUMB_TIP: 4,
            INDEX_TIP: 8,
            MIDDLE_TIP: 12,
            RING_TIP: 16,
            PINKY_TIP: 20,
            INDEX_MCP: 5,
            MIDDLE_MCP: 9,
            RING_MCP: 13,
            PINKY_MCP: 17
        };
        
        // 초기화
        function init() {
            videoElement = document.getElementById('video');
            outputCanvas = document.getElementById('output-canvas');
            webglCanvas = document.getElementById('webgl-canvas');
            canvasCtx = outputCanvas.getContext('2d');
            
            gltfLoader = new THREE.GLTFLoader();
            
            setupThreeJS();
            setupMediaPipe();
            setupEventListeners();
        }
        
        // Three.js 설정
        function setupThreeJS() {
            scene = new THREE.Scene();
            
            // 카메라 설정 개선 - FOV 조정
            camera = new THREE.PerspectiveCamera(
                63, // FOV를 줄여서 왜곡 감소
                window.innerWidth / window.innerHeight, 
                0.1, 
                1000
            );
            camera.position.z = 5;
            
            renderer = new THREE.WebGLRenderer({ 
                canvas: webglCanvas, 
                alpha: true,
                antialias: true,
                precision: 'highp'
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0x000000, 0);
            
            // 조명 설정 개선
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            
            const directionalLight1 = new THREE.DirectionalLight(0xffffff, 0.6);
            directionalLight1.position.set(5, 5, 5);
            scene.add(directionalLight1);
            
            const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
            directionalLight2.position.set(-5, -5, 5);
            scene.add(directionalLight2);
            
            createAccessories();
            
            window.addEventListener('resize', onWindowResize);
        }
        
        // 액세서리 생성
        function createAccessories() {
            // 반지 - 크기 증가
            const ringGeometry = new THREE.TorusGeometry(0.08, 0.025, 16, 32);
            const ringMaterial = new THREE.MeshStandardMaterial({
                color: 0xFFD700,
                metalness: 0.9,
                roughness: 0.1,
                emissive: 0xFFD700,
                emissiveIntensity: 0.3
            });
            const ring = new THREE.Mesh(ringGeometry, ringMaterial);
            
            // 팔찌 - 크기 증가 및 디자인 개선
            const braceletGeometry = new THREE.TorusGeometry(0.18, 0.03, 16, 32);
            const braceletMaterial = new THREE.MeshStandardMaterial({
                color: 0xC0C0C0,
                metalness: 0.9,
                roughness: 0.1,
                emissive: 0xC0C0C0,
                emissiveIntensity: 0.2
            });
            const bracelet = new THREE.Mesh(braceletGeometry, braceletMaterial);
            
            // 공 - 크기 증가
            const ballGeometry = new THREE.SphereGeometry(0.2, 32, 32);
            const ballMaterial = new THREE.MeshStandardMaterial({
                color: 0xFF4444,
                metalness: 0.3,
                roughness: 0.6,
                emissive: 0xFF0000,
                emissiveIntensity: 0.2
            });
            const ball = new THREE.Mesh(ballGeometry, ballMaterial);
            
            // 시계 - 크기 증가 및 디자인 개선
            const watchGroup = new THREE.Group();
            const watchBandGeometry = new THREE.CylinderGeometry(0.12, 0.12, 0.2, 32);
            const watchBandMaterial = new THREE.MeshStandardMaterial({
                color: 0x222222,
                metalness: 0.3,
                roughness: 0.7
            });
            const watchBand = new THREE.Mesh(watchBandGeometry, watchBandMaterial);
            
            const watchFaceGeometry = new THREE.CylinderGeometry(0.13, 0.13, 0.08, 32);
            const watchFaceMaterial = new THREE.MeshStandardMaterial({
                color: 0x333333,
                metalness: 0.8,
                roughness: 0.2
            });
            const watchFace = new THREE.Mesh(watchFaceGeometry, watchFaceMaterial);
            watchFace.position.y = 0.08;
            
            const screenGeometry = new THREE.CircleGeometry(0.11, 32);
            const screenMaterial = new THREE.MeshStandardMaterial({
                color: 0x1a1a1a,
                emissive: 0x0088ff,
                emissiveIntensity: 0.4
            });
            const screen = new THREE.Mesh(screenGeometry, screenMaterial);
            screen.position.set(0, 0.12, 0.051);
            
            watchGroup.add(watchBand);
            watchGroup.add(watchFace);
            watchGroup.add(screen);
            watchGroup.rotation.z = Math.PI / 2;
            
            // 각 손에 액세서리 할당
            handObjects.left = {
                ring: ring.clone(),
                bracelet: bracelet.clone(),
                ball: ball.clone(),
                watch: watchGroup.clone()
            };
            
            handObjects.right = {
                ring: ring.clone(),
                bracelet: bracelet.clone(),
                ball: ball.clone(),
                watch: watchGroup.clone()
            };
            
            // 씬에 추가
            Object.values(handObjects.left).forEach(obj => {
                obj.visible = false; // 초기에는 숨김
                scene.add(obj);
            });
            Object.values(handObjects.right).forEach(obj => {
                obj.visible = false; // 초기에는 숨김
                scene.add(obj);
            });
            
            updateAccessoryVisibility();
        }
        
        // 액세서리 가시성 업데이트
        function updateAccessoryVisibility() {
            ['left', 'right'].forEach(hand => {
                Object.keys(handObjects[hand]).forEach(mode => {
                    const obj = handObjects[hand][mode];
                    // 현재 모드이고 손이 감지된 경우에만 표시
                    obj.visible = (mode === currentMode) && handDetectionState[hand];
                });
            });
        }
        
        // MediaPipe 설정
        function setupMediaPipe() {
            hands = new Hands({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }
            });
            
            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.7
            });
            
            hands.onResults(onResults);
            
            const cameraInstance = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({ image: videoElement });
                },
                width: 1280,
                height: 720
            });
            cameraInstance.start();
            
            document.getElementById('loading').style.display = 'none';
            updateStatus('준비 완료', 'green');
        }
        
        // 손 추적 결과 처리
        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, outputCanvas.width, outputCanvas.height);
            
            // 모든 손을 감지되지 않은 상태로 초기화
            handDetectionState.left = false;
            handDetectionState.right = false;
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                updateStatus(`손 감지됨 (${results.multiHandLandmarks.length}개)`, 'green');
                
                for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                    const landmarks = results.multiHandLandmarks[i];
                    const handedness = results.multiHandedness[i].label.toLowerCase();
                    
                    // 손 감지 상태 업데이트
                    handDetectionState[handedness] = true;
                    
                    updateHandObject(landmarks, handedness);
                }
            } else {
                updateStatus('손을 보여주세요', 'orange');
            }
            
            // 가시성 업데이트 - 감지되지 않은 손의 객체는 자동으로 숨겨짐
            updateAccessoryVisibility();
            
            canvasCtx.restore();
            
            renderer.render(scene, camera);
        }
        
        // 손 객체 업데이트
        function updateHandObject(landmarks, handedness) {
            const handObj = handObjects[handedness][currentMode];
            
            if (!handObj) return;
            
            switch (currentMode) {
                case 'ring':
                    // 약지에 반지 위치
                    const ringBase = landmarks[LANDMARKS.RING_MCP];
                    const ringTip = landmarks[LANDMARKS.RING_TIP];
                    
                    const ringPos = {
                        x: (ringBase.x + ringTip.x) / 2,
                        y: (ringBase.y + ringTip.y) / 2,
                        z: (ringBase.z + ringTip.z) / 2
                    };
                    
                    updateObjectPosition(handObj, ringPos, handedness);
                    
                    // 반지 회전
                    const ringDir = new THREE.Vector3(
                        ringTip.x - ringBase.x,
                        ringTip.y - ringBase.y,
                        ringTip.z - ringBase.z
                    ).normalize();
                    handObj.quaternion.setFromUnitVectors(
                        new THREE.Vector3(0, 1, 0),
                        ringDir
                    );
                    break;
                    
                case 'bracelet':
                    // 손목에 팔찌 위치
                    const wrist = landmarks[LANDMARKS.WRIST];
                    updateObjectPosition(handObj, wrist, handedness);
                    
                    // 팔찌 회전
                    const indexMCP = landmarks[LANDMARKS.INDEX_MCP];
                    const braceletDir = new THREE.Vector3(
                        indexMCP.x - wrist.x,
                        indexMCP.y - wrist.y,
                        indexMCP.z - wrist.z
                    ).normalize();
                    handObj.quaternion.setFromUnitVectors(
                        new THREE.Vector3(0, 0, 1),
                        braceletDir
                    );
                    break;
                    
                case 'ball':
                    // 손바닥 중앙에 공 위치 (잡는 모션)
                    const indexTip = landmarks[LANDMARKS.INDEX_TIP];
                    const thumbTip = landmarks[LANDMARKS.THUMB_TIP];
                    
                    const palmCenter = {
                        x: (indexTip.x + thumbTip.x) / 2,
                        y: (indexTip.y + thumbTip.y) / 2,
                        z: (indexTip.z + thumbTip.z) / 2
                    };
                    
                    updateObjectPosition(handObj, palmCenter, handedness);
                    
                    // 핀치 거리 계산
                    const pinchDist = Math.sqrt(
                        Math.pow(indexTip.x - thumbTip.x, 2) +
                        Math.pow(indexTip.y - thumbTip.y, 2) +
                        Math.pow(indexTip.z - thumbTip.z, 2)
                    );
                    
                    // 공 크기 조절 (잡을 때 작아짐)
                    const scale = Math.max(0.5, Math.min(1.5, pinchDist * 5));
                    handObj.scale.set(scale, scale, scale);
                    break;
                    
                case 'watch':
                    // 손목에 시계 위치
                    const watchWrist = landmarks[LANDMARKS.WRIST];
                    const watchIndexMCP = landmarks[LANDMARKS.INDEX_MCP];
                    
                    updateObjectPosition(handObj, watchWrist, handedness);
                    
                    // 시계 회전
                    const watchDir = new THREE.Vector3(
                        watchIndexMCP.x - watchWrist.x,
                        watchIndexMCP.y - watchWrist.y,
                        watchIndexMCP.z - watchWrist.z
                    ).normalize();
                    
                    handObj.quaternion.setFromUnitVectors(
                        new THREE.Vector3(0, 1, 0),
                        watchDir
                    );
                    break;
            }
        }
        
        // 객체 위치 업데이트 (화면 좌표를 3D 좌표로 변환)
        function updateObjectPosition(obj, landmark, handedness) {
            // MediaPipe 좌표는 0~1 범위, 화면의 중심을 0으로 변환
            // 왜곡 감소를 위해 스케일 조정
            const x = (landmark.x - 0.5) * 8;
            const y = -(landmark.y - 0.5) * 8;
            const z = -landmark.z * 8;
            
            // 왼손/오른손에 따라 x 좌표 조정
            obj.position.set(handedness === 'left' ? -x : x, y, z);
        }
        
        // GLB 파일 로드
        function loadGLBModel(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const arrayBuffer = e.target.result;
                gltfLoader.parse(arrayBuffer, '', function(gltf) {
                    customModel = gltf.scene;
                    
                    // 모델 크기 조정
                    const box = new THREE.Box3().setFromObject(customModel);
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale = 0.3 / maxDim; // 적절한 크기로 조정
                    customModel.scale.set(scale, scale, scale);
                    
                    // 모델을 현재 모드의 액세서리로 교체
                    replaceAccessoryWithModel(customModel);
                    
                    updateStatus('커스텀 모델 로드 완료', 'green');
                }, function(error) {
                    console.error('GLB 로드 에러:', error);
                    updateStatus('모델 로드 실패', 'red');
                });
            };
            reader.readAsArrayBuffer(file);
        }
        
        // 액세서리를 커스텀 모델로 교체
        function replaceAccessoryWithModel(model) {
            ['left', 'right'].forEach(hand => {
                if (handObjects[hand][currentMode]) {
                    scene.remove(handObjects[hand][currentMode]);
                    handObjects[hand][currentMode] = model.clone();
                    handObjects[hand][currentMode].visible = false;
                    scene.add(handObjects[hand][currentMode]);
                }
            });
            updateAccessoryVisibility();
        }
        
        // 이벤트 리스너 설정
        function setupEventListeners() {
            const buttons = document.querySelectorAll('.mode-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentMode = btn.dataset.mode;
                    updateAccessoryVisibility();
                });
            });
            
            // GLB 파일 업로드
            document.getElementById('glb-file').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    loadGLBModel(file);
                }
            });
        }
        
        // 상태 업데이트
        function updateStatus(message, color) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `
                <div style="color: ${color}">상태: ${message}</div>
                <div>모드: ${getModeText(currentMode)}</div>
                <div style="font-size: 10px; color: #999; margin-top: 5px;">
                    왼손: ${handDetectionState.left ? '✓' : '✗'} | 오른손: ${handDetectionState.right ? '✓' : '✗'}
                </div>
            `;
        }
        
        function getModeText(mode) {
            const texts = {
                'ring': '💍 반지',
                'bracelet': '📿 팔찌',
                'ball': '⚽ 공',
                'watch': '⌚ 시계'
            };
            return texts[mode] || mode;
        }
        
        // 창 크기 조정
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            outputCanvas.width = window.innerWidth;
            outputCanvas.height = window.innerHeight;
        }
        
        // 시작
        init();
    </script>
</body>
</html>
