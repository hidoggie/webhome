<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

  <title>등대 스탬프 투어 AR</title>
  <style>
    /* 기본 초기화 */
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Pretendard', sans-serif; }
    * { box-sizing: border-box; }
    .hidden { display: none !important; }

    /* --- 카메라 배경 --- */
    #camera-feed {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: 1;
    }

    /* --- 캡처 버튼 UI --- */
    #capture-ui {
      position: absolute; bottom: 40px; left: 0; width: 100%;
      display: flex; justify-content: center; z-index: 10;
    }
    #capture-btn {
      width: 70px; height: 70px; border-radius: 50%;
      background: rgba(255, 255, 255, 0.4); border: 4px solid white;
      outline: none; cursor: pointer; transition: transform 0.2s;
      display: flex; justify-content: center; align-items: center;
    }
    #capture-btn.recording {
      background: rgba(255, 0, 0, 0.6); border-color: red;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    /* --- 커스텀 UI 레이어 --- */
    #custom-ui-layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 100; display: flex; flex-direction: column; background: #000;
    }

    /* 1. 미리보기 화면 */
    #preview-screen {
      flex: 1; display: flex; flex-direction: column; width: 100%; height: 100%;
    }
    .media-container {
      flex: 1; position: relative; display: flex; justify-content: center; align-items: center; overflow: hidden;
    }
    .media-content { max-width: 100%; max-height: 100%; object-fit: contain; }
    
    .info-overlay {
      position: absolute; bottom: 20px; left: 20px; color: white;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
    }
    .info-overlay h3 { margin: 0; font-size: 1.5rem; }
    .info-overlay p { margin: 5px 0 0 0; font-size: 1rem; opacity: 0.9; }

    /* 하단 버튼 영역 */
    .bottom-action { padding: 20px; background: white; text-align: center; }
    .action-btn {
      width: 100%; padding: 15px; font-size: 1.2rem; font-weight: bold;
      background-color: #0056b3; color: white; border: none; border-radius: 8px; cursor: pointer;
    }

    /* 2 & 3. 모달 공통 스타일 */
    .modal {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 200;
    }
    .modal-content {
      background: white; width: 85%; max-width: 400px; border-radius: 12px; padding: 25px 20px;
      text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .modal-content p { font-size: 1.1rem; line-height: 1.4; margin-bottom: 25px; color: #333; }
    .share-text { font-size: 0.95rem !important; word-break: keep-all; }

    .modal-buttons { display: flex; gap: 10px; }
    .modal-buttons button {
      flex: 1; padding: 12px; font-size: 1rem; font-weight: bold;
      border: none; border-radius: 6px; cursor: pointer; word-break: keep-all;
    }
    .btn-cancel { background: #e0e0e0; color: #555; }
    .btn-primary { background: #0056b3; color: white; }
    .btn-secondary { background: #4caf50; color: white; }
  </style>
</head>
<body>

  <a-scene embedded id="ar-scene" 
           vr-mode-ui="enabled: false" 
           device-orientation-permission-ui="enabled: false"
           arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;" 
           renderer="antialias: true; alpha: true">
    <a-entity light="type: ambient; intensity: 1.5;"></a-entity>
    <a-entity id="m1" scale="1 1 1" visible="false" gltf-model="url(./models/lighthouse.glb)" animation-mixer="loop: true"></a-entity>      
    <a-camera id="camera" look-controls-enabled="false" arjs-look-controls="smoothingFactor: 0.1" gps-projected-camera="maxDistance: 700"> 
      <a-entity id="m0" position="0 -1.3 -1.5" scale="0.3 0.3 0.3" gltf-model="url(./models/lumi-light-ani.glb)" animation-mixer="loop: true"></a-entity> 
    </a-camera>
  </a-scene>
  
  <div id="capture-ui">
    <button id="capture-btn"></button>
  </div>

  <canvas id="photo-canvas" class="hidden"></canvas>

  <div id="custom-ui-layer" class="hidden">
    
    <div id="preview-screen" class="hidden">
      <div class="media-container">
        <img id="preview-image" class="media-content hidden" />
        <video id="preview-video" class="media-content hidden" autoplay loop muted playsinline></video>
        
        <div class="info-overlay">
          <h3 id="lighthouse-name">📍 호미곶 등대</h3>
          <p id="capture-time"></p>
        </div>
      </div>
      
      <div class="bottom-action">
        <button id="btn-save-stamp" class="action-btn">스탬프북 저장</button>
      </div>
    </div>

    <div id="modal-confirm" class="modal hidden">
      <div class="modal-content">
        <p>현재 등대의 스탬프를 획득하고<br>사진(영상)을 저장하시겠습니까?</p>
        <div class="modal-buttons">
          <button id="btn-confirm-cancel" class="btn-cancel">취소</button>
          <button id="btn-confirm-save" class="btn-primary">확인</button>
        </div>
      </div>
    </div>

    <div id="modal-share" class="modal hidden">
      <div class="modal-content">
        <p class="share-text">
          사진을 등대 커뮤니티에만 게시하려면 좌측의 <strong>'사진후기 게시'</strong> 버튼을,<br>
          게시 후 SNS 에 공유하려면 우측의 <strong>'게시 후 SNS 공유'</strong> 버튼을 눌러주세요.
        </p>
        <div class="modal-buttons">
          <button id="btn-post-review" class="btn-secondary">사진후기 게시</button>
          <button id="btn-post-share" class="btn-primary">게시 후 SNS 공유</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // DOM 요소
      const cameraFeed = document.getElementById('camera-feed');
      const captureBtn = document.getElementById('capture-btn');
      const photoCanvas = document.getElementById('photo-canvas');
      const uiLayer = document.getElementById('custom-ui-layer');
      const previewScreen = document.getElementById('preview-screen');
      const previewImg = document.getElementById('preview-image');
      const previewVid = document.getElementById('preview-video');
      const captureTimeText = document.getElementById('capture-time');
      const btnSaveStamp = document.getElementById('btn-save-stamp');
      
      const modalConfirm = document.getElementById('modal-confirm');
      const btnConfirmCancel = document.getElementById('btn-confirm-cancel');
      const btnConfirmSave = document.getElementById('btn-confirm-save');
      
      const modalShare = document.getElementById('modal-share');
      const btnPostReview = document.getElementById('btn-post-review');
      const btnPostShare = document.getElementById('btn-post-share');

      // 카메라 설정 (후면 카메라 우선)
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: 'environment' }, 
          audio: true // 영상을 위해 오디오도 요청
        });
        cameraFeed.srcObject = stream;
      } catch (err) {
  console.error("카메라 접근 에러 상세:", err);
  
  // 에러 종류에 따른 상세 안내
  if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
    alert("카메라 권한이 차단되었습니다. 브라우저 설정에서 카메라 권한을 '허용'으로 변경해주세요.");
  } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
    alert("사용 가능한 카메라 장치를 찾을 수 없습니다.");
  } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
    alert("다른 앱에서 카메라를 사용 중이거나 하드웨어 오류가 있습니다.");
  } else if (err.name === 'SecurityError' || location.protocol !== 'https:' && location.hostname !== 'localhost') {
    alert("보안 오류: 카메라 접근은 HTTPS 환경이거나 localhost에서만 가능합니다.\n현재 주소: " + location.protocol);
  } else {
    alert("카메라를 실행할 수 없습니다. 에러명: " + err.name);
  }
      }

      // 캡처 관련 변수
      let pressTimer;
      let isRecording = false;
      let mediaRecorder;
      let recordedChunks = [];
      let capturedDataUrl = null;

      // --- [0] 캡처 버튼 로직 (짧게: 사진, 길게: 영상) ---
      
      // 모바일 및 PC 이벤트 동시 지원을 위해 pointer 이벤트 사용
      captureBtn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        // 0.5초 이상 누르고 있으면 영상 촬영 시작
        pressTimer = setTimeout(startVideoRecording, 500);
      });

      captureBtn.addEventListener('pointerup', (e) => {
        e.preventDefault();
        clearTimeout(pressTimer); // 0.5초 전에 떼었으면 타이머 취소

        if (isRecording) {
          stopVideoRecording();
        } else {
          takePhoto();
        }
      });
      // 화면 밖으로 드래그 했을 때 예외처리
      captureBtn.addEventListener('pointerleave', (e) => {
        clearTimeout(pressTimer);
        if (isRecording) stopVideoRecording();
      });

      // 사진 촬영 함수
      function takePhoto() {
        // 캔버스 크기를 비디오 원본 크기에 맞춤
        photoCanvas.width = cameraFeed.videoWidth;
        photoCanvas.height = cameraFeed.videoHeight;
        const ctx = photoCanvas.getContext('2d');
        ctx.drawImage(cameraFeed, 0, 0, photoCanvas.width, photoCanvas.height);
        
        capturedDataUrl = photoCanvas.toDataURL('image/jpeg', 0.8);
        showPreview(capturedDataUrl, 'photo');
      }

      // 비디오 녹화 시작 함수
      function startVideoRecording() {
        if (!cameraFeed.srcObject) return;
        isRecording = true;
        captureBtn.classList.add('recording');
        recordedChunks = [];
        
        try {
          mediaRecorder = new MediaRecorder(cameraFeed.srcObject);
          mediaRecorder.ondataavailable = (event) => {
            if (event.data.size > 0) recordedChunks.push(event.data);
          };
          mediaRecorder.onstop = () => {
            const blob = new Blob(recordedChunks, { type: 'video/webm' });
            capturedDataUrl = URL.createObjectURL(blob);
            showPreview(capturedDataUrl, 'video');
          };
          mediaRecorder.start();
        } catch (err) {
          console.error("영상 녹화 지원 안됨:", err);
          isRecording = false;
          captureBtn.classList.remove('recording');
        }
      }

      // 비디오 녹화 종료 함수
      function stopVideoRecording() {
        if (!isRecording) return;
        isRecording = false;
        captureBtn.classList.remove('recording');
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
          mediaRecorder.stop();
        }
      }

      // --- [1] 미리보기 화면 띄우기 ---
      function showPreview(mediaUrl, type) {
        uiLayer.classList.remove('hidden');
        previewScreen.classList.remove('hidden');
        
        const now = new Date();
        captureTimeText.innerText = now.getFullYear() + "년 " + 
                                  (now.getMonth()+1) + "월 " + 
                                  now.getDate() + "일 " + 
                                  now.getHours() + ":" + 
                                  String(now.getMinutes()).padStart(2, '0');

        if (type === 'photo') {
          previewImg.src = mediaUrl;
          previewImg.classList.remove('hidden');
          previewVid.classList.add('hidden');
          previewVid.pause();
        } else {
          previewVid.src = mediaUrl;
          previewVid.classList.remove('hidden');
          previewImg.classList.add('hidden');
          previewVid.play();
        }
      }

      // --- [2] 스탬프북 저장 로직 ---
      btnSaveStamp.addEventListener('click', () => {
        modalConfirm.classList.remove('hidden');
      });

      btnConfirmCancel.addEventListener('click', () => {
        // 취소 시 AR 화면으로 완전히 돌아가기 (선택 사항)
        // resetUI(); 
        
        // 혹은 모달만 닫기
        modalConfirm.classList.add('hidden');
      });

      btnConfirmSave.addEventListener('click', () => {
        // [DB 저장 로직 (임시)]
        // 사용자 고유 ID, 위치 정보 등과 함께 capturedDataUrl 서버 전송
        console.log("DB 저장 완료: 스탬프 획득!");
        
        modalConfirm.classList.add('hidden');
        modalShare.classList.remove('hidden');
      });

      // --- [4] 사진후기 게시 ---
      btnPostReview.addEventListener('click', () => {
        // [DB 플래그 변경 로직]
        console.log("게시 flag true 업데이트 (game-process.html 에 반영)");
        alert("사진 후기가 게시되었습니다.");
        resetUI();
      });

      // --- [5] 게시 후 SNS 공유 ---
      btnPostShare.addEventListener('click', () => {
        console.log("게시 flag true 업데이트 완료");
        
        // Web Share API를 통한 네이티브 공유 호출
        if (navigator.share) {
          // 사진(파일) 자체를 공유하려면 File 객체로 변환 필요 (여기서는 텍스트/URL 예시)
          navigator.share({
            title: '등대 스탬프 투어',
            text: '호미곶 등대에서 멋진 사진을 찍고 스탬프를 획득했어요!',
          }).then(() => {
            console.log('SNS 공유 성공');
            resetUI();
          }).catch((err) => {
            console.log('공유 취소 또는 실패', err);
            resetUI();
          });
        } else {
          alert("해당 브라우저에서는 공유 기능을 지원하지 않습니다.\n(게시는 완료되었습니다)");
          resetUI();
        }
      });

      // UI 초기화 및 카메라(AR)로 복귀
      function resetUI() {
        uiLayer.classList.add('hidden');
        previewScreen.classList.add('hidden');
        modalConfirm.classList.add('hidden');
        modalShare.classList.add('hidden');
        previewImg.src = "";
        previewVid.src = "";
        previewVid.pause();
      }
    });
  </script>
</body>
</html>
