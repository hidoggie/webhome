<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR 등대 스탬프투어</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw; height: 100vh;
    overflow: hidden;
    font-family: 'Noto Sans KR', sans-serif;
    background: #1a8fdc;
  }

  /* ── 하늘 배경 ── */
  .sky {
    position: absolute; inset: 0;
    background: linear-gradient(175deg, #42c8f5 0%, #1e9fe8 35%, #1a8fdc 60%, #a8d8f0 100%);
  }

  /* ── 구름 ── */
  .cloud {
    position: absolute;
    border-radius: 50px;
    background: rgba(255,255,255,0.88);
    animation: cloudDrift linear infinite;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: inherit;
    border-radius: 50%;
  }
  .cloud-1 { width: 140px; height: 45px; top: 12%; left: -160px; animation-duration: 28s; animation-delay: 0s; }
  .cloud-1::before { width: 60px; height: 60px; top: -30px; left: 20px; }
  .cloud-1::after  { width: 45px; height: 45px; top: -22px; left: 60px; }

  .cloud-2 { width: 90px; height: 30px; top: 8%; left: -110px; animation-duration: 22s; animation-delay: -8s; opacity: 0.7; }
  .cloud-2::before { width: 40px; height: 40px; top: -20px; left: 12px; }
  .cloud-2::after  { width: 30px; height: 30px; top: -16px; left: 40px; }

  .cloud-3 { width: 110px; height: 35px; top: 18%; left: -130px; animation-duration: 32s; animation-delay: -15s; opacity: 0.6; }
  .cloud-3::before { width: 50px; height: 50px; top: -25px; left: 15px; }
  .cloud-3::after  { width: 35px; height: 35px; top: -18px; left: 52px; }

  .cloud-4 { width: 80px; height: 25px; top: 6%; right: -100px; animation-duration: 25s; animation-delay: -5s; animation-direction: reverse; opacity: 0.75; }
  .cloud-4::before { width: 36px; height: 36px; top: -18px; left: 10px; }
  .cloud-4::after  { width: 28px; height: 28px; top: -14px; left: 38px; }

  @keyframes cloudDrift {
    from { transform: translateX(0); }
    to   { transform: translateX(calc(100vw + 200px)); }
  }

  /* ── 갈매기 ── */
  .seagull {
    position: absolute;
    width: 30px; height: 12px;
    animation: seagullFly linear infinite;
  }
  .seagull::before, .seagull::after {
    content: '';
    position: absolute;
    top: 0;
    width: 14px; height: 12px;
    border-top: 2.5px solid rgba(255,255,255,0.9);
    border-radius: 50% 50% 0 0 / 100% 0 0 0;
    animation: wingFlap 0.55s ease-in-out infinite alternate;
  }
  .seagull::before { left: 0; transform-origin: right center; }
  .seagull::after  { right: 0; transform-origin: left center; animation-direction: alternate-reverse; }

  .sg-1 { top: 14%; left: -40px; animation-duration: 14s; animation-delay: 0s; }
  .sg-2 { top: 9%;  left: -40px; animation-duration: 18s; animation-delay: -6s; transform: scale(0.7); }
  .sg-3 { top: 20%; right: -40px; animation-duration: 16s; animation-delay: -3s; animation-direction: reverse; transform: scale(0.8) scaleX(-1); }

  @keyframes seagullFly {
    from { transform: translateX(0) translateY(0); }
    25%  { transform: translateX(25vw) translateY(-10px); }
    50%  { transform: translateX(50vw) translateY(5px); }
    75%  { transform: translateX(75vw) translateY(-8px); }
    to   { transform: translateX(calc(100vw + 60px)) translateY(0); }
  }
  @keyframes wingFlap {
    from { transform: rotate(-18deg); }
    to   { transform: rotate(18deg); }
  }

  /* ── 바다 ── */
  .ocean {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 32%;
    background: linear-gradient(180deg, #0e74c8 0%, #0a5a9e 40%, #073e72 100%);
    overflow: hidden;
  }
  .wave {
    position: absolute;
    width: 250%;
    height: 60px;
    background: rgba(255,255,255,0.07);
    border-radius: 50%;
    animation: waveMove linear infinite;
  }
  .wave-1 { top: 8px; left: -150%; animation-duration: 7s; }
  .wave-2 { top: 20px; left: -100%; animation-duration: 10s; animation-delay: -3s; opacity: 0.6; }
  .wave-3 { top: 4px; left: -200%; animation-duration: 8.5s; animation-delay: -1.5s; opacity: 0.4; }
  @keyframes waveMove {
    from { transform: translateX(0); }
    to   { transform: translateX(40%); }
  }

  /* ── 배 ── */
  .boat {
    position: absolute;
    bottom: 28%; left: 8%;
    animation: boatRock 5s ease-in-out infinite;
    transform-origin: center bottom;
  }
  .boat-body {
    width: 60px; height: 20px;
    background: #e8e8e8;
    border-radius: 0 0 16px 16px;
    position: relative;
  }
  .boat-cabin {
    position: absolute;
    width: 26px; height: 14px;
    background: #c9d4e0;
    border-radius: 3px 3px 0 0;
    top: -14px; left: 10px;
  }
  .boat-mast {
    position: absolute;
    width: 2px; height: 36px;
    background: #888;
    top: -50px; left: 29px;
  }
  @keyframes boatRock {
    0%,100% { transform: rotate(-1.5deg) translateY(0); }
    50%      { transform: rotate(1.5deg)  translateY(-3px); }
  }

  /* ── 방파제/부두 ── */
  .pier {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 240px;
    background: linear-gradient(180deg, #e8dfc8 0%, #d4c9a8 50%, #b8a882 100%);
    clip-path: polygon(0 42%, 12% 22%, 72% 10%, 88% 0%, 100% 0%, 100% 100%, 0 100%);
  }
  .fence-post { width: 10px; height: 30px; background: #888; border-radius: 2px; position: absolute; top: -15px; }
  .fence-post:nth-child(1) { left: 10%; }
  .fence-post:nth-child(2) { left: 20%; }
  .fence-post:nth-child(3) { left: 30%; }
  .fence-post:nth-child(4) { left: 40%; }
  .fence-post:nth-child(5) { left: 50%; }
  .fence-post:nth-child(6) { left: 60%; }
  .fence-post:nth-child(7) { left: 70%; }
  .fence-post:nth-child(8) { left: 80%; }
  .fence-post:nth-child(9) { left: 90%; }

  /* ── 등대 (우측) ── */
  .lighthouse-right {
    position: absolute;
    right: 6%; bottom: 18%;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: lighthouseAppear 1s ease-out both;
    animation-delay: 0.6s;
  }
  .lh-light-glow {
    position: absolute;
    top: -8px;
    width: 60px; height: 60px;
    background: radial-gradient(circle, rgba(255,240,100,0.7) 0%, rgba(255,200,0,0.2) 50%, transparent 70%);
    border-radius: 50%;
    animation: glowPulse 2s ease-in-out infinite;
  }
  .lh-top {
    width: 30px; height: 18px;
    background: linear-gradient(180deg, #c0392b 0%, #922b21 100%);
    border-radius: 2px 2px 0 0;
    position: relative; z-index: 1;
  }
  .lh-lamp {
    width: 34px; height: 22px;
    background: linear-gradient(180deg, #ffeaa0 0%, #f0c040 100%);
    border: 2px solid #c0392b;
    border-radius: 2px;
    position: relative;
    z-index: 1;
    box-shadow: 0 0 10px rgba(255,220,50,0.8);
    animation: lampBlink 3s ease-in-out infinite;
  }
  .lh-rail {
    width: 44px; height: 8px;
    background: linear-gradient(180deg, #c0392b 0%, #922b21 100%);
    border-radius: 1px;
  }
  .lh-body {
    width: 36px; height: 100px;
    background: linear-gradient(180deg, #f5f5f5 0%, #e8e8e8 50%, #d8d8d8 100%);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
  }
  .lh-stripe {
    position: absolute;
    left: 0; right: 0;
    height: 14px;
    background: #c0392b;
    opacity: 0.85;
  }
  .lh-stripe:nth-child(1) { top: 18px; }
  .lh-stripe:nth-child(2) { top: 50px; }
  .lh-stripe:nth-child(3) { top: 82px; }
  .lh-door {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 10px; height: 16px;
    background: #4a90d9;
    border-radius: 5px 5px 0 0;
  }
  .lh-base {
    width: 46px; height: 12px;
    background: linear-gradient(180deg, #bbb 0%, #999 100%);
    border-radius: 2px;
  }
  .lh-rock {
    width: 60px; height: 16px;
    background: linear-gradient(180deg, #888 0%, #666 100%);
    border-radius: 50% 50% 0 0;
    margin-top: -2px;
  }
  @keyframes glowPulse {
    0%,100% { transform: scale(1); opacity: 0.9; }
    50%      { transform: scale(1.3); opacity: 1; }
  }
  @keyframes lampBlink {
    0%,90%,100% { box-shadow: 0 0 10px rgba(255,220,50,0.8); }
    95%          { box-shadow: 0 0 20px rgba(255,220,50,1), 0 0 35px rgba(255,200,0,0.6); }
  }
  @keyframes lighthouseAppear {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── 마스코트 캐릭터 ── */
  .mascot {
    position: absolute;
    bottom: 24%;
    left: 50%;
    transform: translateX(-50%);
    width: 240px;
    animation: mascotFloat 3.2s ease-in-out infinite,
                mascotAppear 0.9s cubic-bezier(0.34,1.56,0.64,1) both;
    animation-delay: 0s, 0.3s;
    transform-origin: center bottom;
    z-index: 10;
  }
  .mascot-inner {
    width: 100%;
    animation: mascotSway 5.6s ease-in-out infinite 0.6s;
    transform-origin: center bottom;
  }
  .mascot-inner img {
    width: 100%;
    height: auto;
    display: block;
    filter: drop-shadow(0 12px 24px rgba(0,0,0,0.28));
  }
  @keyframes mascotFloat {
    0%   { transform: translateX(-50%) translateY(0px); }
    50%  { transform: translateX(-50%) translateY(-20px); }
    100% { transform: translateX(-50%) translateY(0px); }
  }
  @keyframes mascotSway {
    0%   { transform: rotate(0deg); }
    20%  { transform: rotate(10deg); }
    50%  { transform: rotate(0deg); }
    80%  { transform: rotate(-10deg); }
    100% { transform: rotate(0deg); }
  }
  @keyframes mascotAppear {
    from { opacity: 0; transform: translateX(-50%) scale(0.6) translateY(50px); }
    to   { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
  }

  /* ── 별 장식 ── */
  .star {
    position: absolute;
    animation: starFloat 3s ease-in-out infinite, starAppear 0.5s ease both;
  }
  .star svg { filter: drop-shadow(0 2px 6px rgba(255,200,0,0.6)); }
  .star-1 { top: 30%; left: 12%; animation-delay: 0.2s, 0.5s; }
  .star-2 { top: 20%; left: 72%; animation-delay: 0.8s, 0.8s; animation-duration: 3.5s, 0.5s; }
  @keyframes starFloat {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50%     { transform: translateY(-10px) rotate(15deg); }
  }
  @keyframes starAppear {
    from { opacity: 0; transform: scale(0) rotate(-30deg); }
    to   { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  /* ── 타이틀 이미지 ── */
  .title-container {
    position: absolute;
    top: 8%;
    left: 50%;
    transform: translateX(-50%);
    width: min(360px, 78vw);
    text-align: center;
    z-index: 20;
    animation: titleDrop 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
    animation-delay: 0.1s;
  }
  .title-container img {
    width: 100%;
    height: auto;
    display: block;
    filter: drop-shadow(0 4px 14px rgba(0,0,0,0.2));
  }
  @keyframes titleDrop {
    from { opacity: 0; transform: translateX(-50%) translateY(-30px) scale(0.85); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  }

  /* ── 스파클 ── */
  .sparkle {
    position: absolute;
    pointer-events: none;
    animation: sparklePop ease-out forwards;
  }
  @keyframes sparklePop {
    0%   { opacity: 1; transform: scale(0) rotate(0deg); }
    50%  { opacity: 1; transform: scale(1.2) rotate(90deg); }
    100% { opacity: 0; transform: scale(0.5) rotate(180deg); }
  }

  /* ── 버튼 ── */
  .btn {
    position: absolute;
    top: 80%;
    left: 50%;
    transform: translate(-50%, 0);
    z-index: 2;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 50px;
  }

  .btn-start {
    display: inline-block;
    padding: 16px 48px;
    font-size: 1.5rem;
    font-weight: bold;
    color: #ffffff;
    background: linear-gradient(135deg, #ff7e5f, #feb47b); 
    border: none;
    border-radius: 50px;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: pointer;
  }

  /* ── 여권 발급 팝업(모달) ── */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: rgba(0, 0, 0, 0.6);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 100;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal-content {
    background-color: #ffffff;
    border-radius: 20px;
    width: 90%;
    max-width: 340px;
    padding: 30px 20px;
    text-align: center;
    position: relative;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  }

  .close-btn {
    position: absolute;
    top: 15px; right: 15px;
    background: #e8e8e8;
    border: none;
    color: #555;
    width: 30px; height: 30px;
    border-radius: 50%;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-header {
    font-size: 18px;
    font-weight: 900;
    color: #1a8fdc;
    margin-bottom: 15px;
  }

  /* 캡처를 위해 여권 번호와 안내 문구를 감싸는 영역 */
  #captureArea {
    background-color: #ffffff;
    padding: 10px;
    border-radius: 10px;
  }

  .warning-text {
    font-size: 13px;
    color: #e74c3c;
    margin-bottom: 15px;
    line-height: 1.4;
    word-break: keep-all;
  }

  .passport-id-box {
    background-color: #f0f4f8;
    border: 2px dashed #1a8fdc;
    color: #111;
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 2px;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
    font-family: 'Courier New', Courier, monospace;
  }

  .action-buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .btn-copy {
    flex: 1;
    background: none;
    border: 1px solid #aaa;
    color: #555;
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    font-weight: bold;
  }
  .btn-copy:active { background: #eee; }

  .divider {
    display: flex;
    align-items: center;
    text-align: center;
    color: #999;
    font-size: 12px;
    margin: 20px 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    border-bottom: 1px solid #ddd;
  }
  .divider span { padding: 0 10px; }

  .input-passport {
    width: 100%;
    padding: 12px;
    border: 1px solid #ccc;
    border-radius: 10px;
    font-size: 14px;
    text-align: center;
    margin-bottom: 15px;
    font-family: 'Courier New', Courier, monospace;
  }

  .btn-action {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    color: white;
    cursor: pointer;
  }
  .btn-coral { background: linear-gradient(135deg, #ff7e5f, #feb47b); }
  .btn-blue { background: linear-gradient(135deg, #1e9fe8, #1a8fdc); }

</style>
</head>
<body>

<div class="sky">

  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
  <div class="cloud cloud-4"></div>

  <div class="seagull sg-1"></div>
  <div class="seagull sg-2"></div>
  <div class="seagull sg-3"></div>

  <div class="title-container">
    <img src="./img/intro-text.png" alt="페이지 타이틀"></div>

  <div class="star star-1">
    <svg width="42" height="42" viewBox="0 0 42 42">
      <polygon points="21,4 25,15 37,15 27,22 31,34 21,27 11,34 15,22 5,15 17,15"
               fill="#ffd700" stroke="#f0a500" stroke-width="1.5"/>
    </svg>
  </div>
  <div class="star star-2">
    <svg width="28" height="28" viewBox="0 0 28 28">
      <polygon points="14,3 17,10 25,10 19,15 21,23 14,18 7,23 9,15 3,10 11,10"
               fill="#ffd700" stroke="#f0a500" stroke-width="1"/>
    </svg>
  </div>

  <div class="ocean">
    <div class="wave wave-1"></div>
    <div class="wave wave-2"></div>
    <div class="wave wave-3"></div>
  </div>

  <div class="boat">
    <div class="boat-mast"></div>
    <div class="boat-body">
      <div class="boat-cabin"></div>
    </div>
  </div>

  <div class="pier">
      <div class="fence-post"></div>
      <div class="fence-post"></div>
      <div class="fence-post"></div>
      <div class="fence-post"></div>
      <div class="fence-post"></div>
      <div class="fence-post"></div>
      <div class="fence-post"></div>
      <div class="fence-post"></div>
      <div class="fence-post"></div>
  </div>

  <div class="lighthouse-right">
    <div class="lh-light-glow"></div>
    <div class="lh-top"></div>
    <div class="lh-lamp"></div>
    <div class="lh-rail"></div>
    <div class="lh-body">
      <div class="lh-stripe"></div>
      <div class="lh-stripe"></div>
      <div class="lh-stripe"></div>
      <div class="lh-door"></div>
    </div>
    <div class="lh-base"></div>
    <div class="lh-rock"></div>
  </div>

  <div class="mascot">
    <div class="mascot-inner"><img src="./img/lumi-wink-2.gif" alt="AR 등대 스탬프투어 마스코트 루미"></div>
  </div>

  <div class="btn">
     <button class="btn-start" onclick="openPassportModal()">시작하기</button>
  </div>

</div>

<div id="passportModal" class="modal-overlay">
  <div class="modal-content">
    <button class="close-btn" onclick="closePassportModal()">×</button>
    <div class="modal-header">나의 등대 여권 발급</div>

    <div class="new-user-section">
      <div id="captureArea">
        <p class="warning-text">브라우저나 기기 변경 시 이력을 불러오기 위해<br>아래 <strong>여권 번호</strong>를 복사하거나 이미지로 저장해주세요!</p>
        <div class="passport-id-box" id="newPassportId">생성 중...</div>
      </div>
      
      <div class="action-buttons">
        <button class="btn-copy" onclick="copyPassportId()">번호 복사</button>
        <button class="btn-copy" onclick="savePassportImage()">이미지 저장</button>
      </div>
      
      <button class="btn-action btn-coral" onclick="startNewJourney()">새로 시작하기</button>
    </div>

    <div class="divider"><span>또는</span></div>

    <div class="existing-user-section">
      <input type="text" id="existingPassportId" class="input-passport" placeholder="기존 여권 번호 입력" autocomplete="off">
      <button class="btn-action btn-blue" onclick="resumeJourney()">이어하기</button>
    </div>
  </div>
</div>

<script>
  // 반짝이 스파클 효과
  function createSparkle() {
    const el = document.createElement('div');
    el.className = 'sparkle';
    const size = Math.random() * 14 + 6;
    el.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*90+5}%; top:${Math.random()*60+5}%;
      animation-duration:${Math.random()*0.8+0.6}s;
    `;
    el.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 10 10">
      <polygon points="5,0 6,4 10,5 6,6 5,10 4,6 0,5 4,4"
               fill="rgba(255,230,50,0.9)"/>
    </svg>`;
    document.querySelector('.sky').appendChild(el);
    setTimeout(() => el.remove(), 1400);
  }
  setInterval(createSparkle, 600);

  // ── 여권 팝업 관련 로직 ── //

  // 랜덤 여권 번호 생성기 (DB 연동 전 UI 테스트용)
  function generateMockPassportId() {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let id = 'LH-';
    for(let i=0; i<4; i++) id += chars.charAt(Math.floor(Math.random() * chars.length));
    id += '-';
    for(let i=0; i<4; i++) id += chars.charAt(Math.floor(Math.random() * chars.length));
    return id;
  }

  // 모달 열기
  function openPassportModal() {
    document.getElementById('newPassportId').innerText = generateMockPassportId();
    document.getElementById('passportModal').style.display = 'flex';
  }

  // 모달 닫기
  function closePassportModal() {
    document.getElementById('passportModal').style.display = 'none';
  }

  // 번호 복사
  function copyPassportId() {
    const idText = document.getElementById('newPassportId').innerText;
    navigator.clipboard.writeText(idText).then(() => {
        alert('여권 번호 [' + idText + ']가 복사되었습니다!');
    }).catch(err => {
        alert('복사에 실패했습니다. 직접 메모해주세요.');
    });
  }

  // ── 여권 영역 이미지로 캡처하여 저장하기 ── //
  function savePassportImage() {
    const captureArea = document.getElementById('captureArea');
    
    // html2canvas 실행 (배경색 흰색 지정)
    html2canvas(captureArea, { backgroundColor: '#ffffff', scale: 2 }).then(canvas => {
      // 이미지 URL 변환
      const imageURL = canvas.toDataURL('image/png');
      
      // 가상 링크 생성 및 다운로드 트리거
      const downloadLink = document.createElement('a');
      downloadLink.href = imageURL;
      downloadLink.download = '나의_등대_여권번호.png'; // 저장될 파일 이름
      document.body.appendChild(downloadLink);
      downloadLink.click();
      document.body.removeChild(downloadLink);
    }).catch(err => {
      console.error('캡처 실패:', err);
      alert('이미지 저장에 실패했습니다. 화면을 직접 캡처해주세요.');
    });
  }

  // 새로 시작하기 라우팅
  function startNewJourney() {
    // 향후 이곳에서 서버 API(/api/tour/register)를 호출하여 세션과 여권 번호를 DB에 등록합니다.
    window.location.href = 'lighthouse_map.html';
  }

  // 이어하기 라우팅
  function resumeJourney() {
    const val = document.getElementById('existingPassportId').value.trim().toUpperCase();
    if(!val) {
        alert('발급받으셨던 여권 번호를 입력해주세요.');
        return;
    }
    
    // 향후 이곳에서 서버 API(/api/tour/login)를 호출하여 코드를 검증하고 세션을 교체합니다.
    alert('[' + val + '] 여권으로 이력을 불러옵니다!');
    window.location.href = 'lighthouse_map.html';
  }

  // 배경 클릭 시 팝업 닫기 (선택 사항)
  window.onclick = function(event) {
    const modal = document.getElementById('passportModal');
    if (event.target == modal) {
      closePassportModal();
    }
  }
</script>
</body>
</html>
