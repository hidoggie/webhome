<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR 등대 라인 길안내</title>

    <meta name="theme-color" content="#ffffff" id="theme-color-meta">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=eb9mai2ikc"></script>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

    <script>
    AFRAME.registerComponent("run", {
        init: function() {
            this.m0 = document.querySelector("#m0");
            this.m1 = document.querySelector("#m1");
            this.p0 = new THREE.Vector3();
            this.p1 = new THREE.Vector3();
            
            var geometry = new THREE.CylinderGeometry(0.3, 0.3, 1, 12);
            geometry.applyMatrix4(new THREE.Matrix4().makeTranslation(0, 0.5, 0));
            geometry.applyMatrix4(new THREE.Matrix4().makeRotationX(THREE.Math.degToRad(90)));
            var material = new THREE.MeshLambertMaterial({ color: 0x066265, opacity: 0.6, transparent: true });

            this.cylinder = new THREE.Mesh(geometry, material);
            this.cylinderGroup = document.querySelector("#cylinderGroup").object3D;
            this.cylinderGroup.add(this.cylinder);
        },
        tick: function() {
            if (!this.m0 || !this.m1) return;
            this.m0.object3D.getWorldPosition(this.p0);
            this.m1.object3D.getWorldPosition(this.p1);

            let distance = this.p0.distanceTo(this.p1);
            this.cylinderGroup.lookAt(this.p1);
            this.cylinder.scale.set(1, 1, distance);
            this.cylinder.visible = true;
        }
    });
    </script>

    <style>
        /* 1. PC 기본 배경 (Flex 속성 제거하여 좌우 분할 문제 해결) */
        html, body { 
            margin: 0 !important; 
            padding: 0 !important; 
            width: 100% !important; 
            height: 100% !important; 
            background-color: #f0f0f0; 
            font-family: sans-serif;
            overflow: hidden !important; /* ★ 스크롤바가 생기는 것을 원천 차단 */
        }

        /* 2. 모바일 화면 틀 (Max-width 400px 적용 및 중앙 정렬) */
        #app-wrapper {
            width: 100%; 
            max-width: 400px; 
            height: 100%;
            margin: 0 auto; /* 화면 중앙 정렬 */
            position: relative;
            background-color: #ffffff;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            display: flex; flex-direction: column;
        }

        /* ★ 3. AR 카메라 화면을 400px 틀 안에 가두는 핵심 CSS */
        #app-wrapper video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important; 
            margin: 0 !important;
            top: 0 !important;
            left: 0 !important;
            position: absolute !important;
            z-index: 0 !important;
        }

        /* 2. 3D 모델이 그려지는 캔버스(canvas)는 강제 왜곡 속성(object-fit)을 제거합니다. */
        #app-wrapper canvas.a-canvas {
            width: 100% !important;
            height: 100% !important;
            /* object-fit 속성 삭제됨 */
            margin: 0 !important;
            top: 0 !important;
            left: 0 !important;
            position: absolute !important;
            z-index: 1 !important;
        }


        #app-wrapper video { z-index: 0 !important; } /* 카메라는 가장 밑바닥 */
        #app-wrapper canvas.a-canvas { z-index: 1 !important; } /* 3D 모델은 그 위 */

        /* 시작 화면 오버레이 */
        #start_area { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #start_btn { padding: 15px 30px; font-size: 18px; font-weight: bold; background: #066265; color: white; border: none; border-radius: 10px; margin-top: 20px; cursor: pointer; }
        
        /* 미니맵 및 UI */
        #minimap-wrapper {
            border-bottom-left-radius: 50%; border-bottom-right-radius: 50%;
            position: absolute; top: 0; left: 0; width: 100%; height: 20%; 
            border: 4px solid #066265; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            overflow: hidden; z-index: 1000; display: none;
        }
        #minimap { width: 100%; height: 100%; }

        .info-panel { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 80%; background-color: rgba(6, 98, 101, 0.5); border-radius: 15px; padding: 5px; color: white; text-align: center; z-index: 1000; display: none; }
        .distance-text { font-size: 16px; font-weight: bold; margin: 0; }

        .modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 99999; display: none; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; text-align: center; width: 70%; }
        .modal-content p { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 20px; }
        .btn-confirm { background: #066265; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-size: 16px; cursor: pointer; }
        
        /* AR 영역 및 하단 메뉴 (app-wrapper 내부 91:9 분할) 
        .ar-overlay { position: relative; width: 100%; height: 91%; }  */      
        .ar-overlay { 
            flex: 1; /* 네비게이션을 제외한 나머지 공간을 꽉 채움 */
            position: relative; 
            width: 100%; 
        }
    /*    
        .bottom-nav {
            position: absolute; bottom: 0; left: 0;
            border-radius: 5px; height: 9%; background-color: #1a3350;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 30; width: 100%;
        }
*/
        .bottom-nav {
            flex-shrink: 0; /* 화면이 작아져도 네비게이션 바 높이 유지 */
            height: 70px; /* 퍼센트(9%) 대신 고정 픽셀을 주어 안정성 확보 */
            background-color: #1a3350;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 30; width: 100%;
        }
        .nav-item {
            background: none; border: none; color: #8fa6c1; cursor: pointer; text-decoration: none;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .nav-item.active { color: white; }
        .nav-item .icon { font-size: 24px;}
        .nav-item .label { font-size: 12px; font-weight: 500; }
        .nav-item img { width: 24px; height: 24px; }
    </style>
</head>
<body>

    <div id="app-wrapper">

        <div id="start_area">     
            <img src="./img/lumi-wink-2.gif" alt="아이콘" width="100">
            <img src="./img/ar-navi-text.png" alt="AR 등대 길찾기" width="200">
            <p style="color: #066265; font-weight:bold;">증강현실(AR) 사용시,<br>주변 사물과 부딪치지 않도록 주의하세요.</p> 
            <button id="start_btn" onclick="startNavigation()">안내 시작</button>
        </div>

        <div id="minimap-wrapper">
            <div id="minimap"></div>
        </div>

        <div class="info-panel" id="info-panel">
            <p class="distance-text" id="distance-info">가까운 등대 찾는 중...</p>
        </div>

        <div class="modal" id="alert-modal">
            <div class="modal-content">
                <p id="alert-msg"></p>
                <button class="btn-confirm" onclick="closeModal()">확인</button>
            </div>
        </div>

        <div class="ar-overlay" id="ar-container"></div>

        <nav class="bottom-nav">
            <a href="lighthouse_map.html" class="nav-item active">
                <span class="icon"><img src="./img/home_white.png"></span>
                <span class="label">홈</span>
            </a>
            <a href="lh-passport.html" class="nav-item">
                <span class="icon"><img src="./img/passport_white.png"></span>
                <span class="label">스탬프북</span>
            </a> 
            <button class="nav-item">
                <span class="icon"><img src="./img/info_white.png"></span>
                <span class="label">안내</span>
            </button>
        </nav>

    </div> <script>
        const lighthouses = [
            { title: "간절곶등대", lat: 35.3590, lng: 129.3606 },
            { title: "영도등대", lat: 35.0523, lng: 129.0921 },
            { title: "산지등대", lat: 33.5214, lng: 126.5456 },
            { title: "소매물도등대", lat: 34.6196, lng: 128.5479 },
            { title: "오동도등대", lat: 34.7442, lng: 127.7677 },
            { title: "등대", lat: 37.4891, lng: 126.9569 }   //test용
        ];

        let targetLighthouse = null;
        let map, myLocMarker, targetMarker;
        let watchId;

        async function startNavigation() {
            // 권한 압축 처리 (방향, 카메라, GPS 사전 확인)
            try {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    await DeviceOrientationEvent.requestPermission();
                }
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                stream.getTracks().forEach(track => track.stop()); 
                await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true });
                });
            } catch (error) {
                console.warn("사전 권한 확인 완료 (진행 가능):", error);
            }

            // 시작 UI 숨기기 및 네비/미니맵 노출
            document.getElementById("start_area").style.display = "none";
            document.getElementById("minimap-wrapper").style.display = "block";
            document.getElementById("info-panel").style.display = "block";

            // ★ 아이폰 주소창 색상 완벽 동기화 (body 배경도 함께 변경)
            document.body.style.backgroundColor = "#000000"; 
            document.getElementById("app-wrapper").style.backgroundColor = "#ffffff"; 
            const themeMeta = document.getElementById("theme-color-meta");
            if(themeMeta) themeMeta.setAttribute("content", "#000000"); 

            // AR 씬 삽입
            const arContainer = document.getElementById("ar-container");
            arContainer.innerHTML = `
                <a-scene embedded id="ar-scene" 
                         vr-mode-ui="enabled: false" 
                         device-orientation-permission-ui="enabled: false"
                         arjs="sourceType: webcam; debugUIEnabled: false;" 
                         renderer="antialias: true; alpha: true">
                    <a-entity light="type: ambient; intensity: 1.5;"></a-entity>
                    <a-entity id="m1" scale="1 1 1" visible="false" gltf-model="url(./models/lighthouse.glb)" animation-mixer="loop: true"></a-entity>      
                    <a-camera id="camera" look-controls-enabled="false" arjs-look-controls="smoothingFactor: 0.1" gps-projected-camera="maxDistance: 700"> 
                        <a-entity id="m0" position="0 -1 -1.5" scale="0.3 0.3 0.3" gltf-model="url(./models/lumi-light-ani.glb)" animation-mixer="loop: true"></a-entity> 
                        <a-entity id="cylinderGroup" position="0 -1.2 -2.5"></a-entity>
                    </a-camera>
                    <a-entity run></a-entity>
                </a-scene>
            `;

            // ★ AR.js가 body에 생성하는 카메라 영상을 400px 틀(app-wrapper) 안으로 이동시키는 핵심 로직
            let checkVideo = setInterval(() => {
                let video = document.querySelector('video');
                if(video) {
                    clearInterval(checkVideo);
                    document.getElementById('app-wrapper').appendChild(video);
                }
            }, 100);

            initMap();
            startTracking();
        }

        function initMap() {
            map = new naver.maps.Map('minimap', {
                center: new naver.maps.LatLng(37.5666, 126.9784),
                zoom: 17, 
                disableKinematicPan: true, mapDataControl: false, scaleControl: false, logoControl: false, zoomControl: false, draggable: false
            });
        }

        function startTracking() {
            if (navigator.geolocation) {
                watchId = navigator.geolocation.watchPosition(
                    position => processLocationUpdate(position.coords.latitude, position.coords.longitude),
                    error => console.warn(error),
                    { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
                );
            }
        }

        function processLocationUpdate(lat, lng) {
            const currentLatLng = new naver.maps.LatLng(lat, lng);
            
            map.setCenter(currentLatLng);
            if (!myLocMarker) {
                myLocMarker = new naver.maps.Marker({
                    position: currentLatLng, map: map,
                    icon: { content: '<div style="width:16px;height:16px;background:red;border-radius:50%;border:2px solid white;"></div>' }
                });
            } else {
                myLocMarker.setPosition(currentLatLng);
            }

            if (!targetLighthouse) {
                targetLighthouse = findNearestLighthouse(lat, lng);
                let m1 = document.getElementById('m1');
                if(m1) {
                    m1.setAttribute('gps-projected-entity-place', `latitude: ${targetLighthouse.lat}; longitude: ${targetLighthouse.lng};`);
                    m1.setAttribute('visible', 'true');
                }
            }

            const targetLatLng = new naver.maps.LatLng(targetLighthouse.lat, targetLighthouse.lng);
            const distance = Math.round(calculateDistance(lat, lng, targetLighthouse.lat, targetLighthouse.lng));

            document.getElementById('distance-info').innerText = `${targetLighthouse.title}까지 ${distance}m`;

            if (!targetMarker) {
                targetMarker = new naver.maps.Marker({
                    position: targetLatLng, map: map,
                    icon: { content: '<div style="font-size:20px;"><img src="./img/lighthouse-i.png" style="width:40px;height:40px;"></div>' }
                });
            }

            if (distance > 1000) {
                showAlert("거리가 너무 멀어요!<br>등대 근처에서 다시 시도해 주세요.");
                navigator.geolocation.clearWatch(watchId);
            } else if (distance < 10) {
                showAlert("축하합니다!<br>등대에 도착했습니다.");
                navigator.geolocation.clearWatch(watchId);
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const radLat1 = lat1 * Math.PI / 180;
            const radLat2 = lat2 * Math.PI / 180;
            const deltaLat = (lat2 - lat1) * Math.PI / 180;
            const deltaLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(deltaLat/2) * Math.sin(deltaLat/2) + Math.cos(radLat1) * Math.cos(radLat2) * Math.sin(deltaLon/2) * Math.sin(deltaLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function findNearestLighthouse(lat, lng) {
            let minDistance = Infinity;
            let nearest = lighthouses[0];
            lighthouses.forEach(lh => {
                let dist = calculateDistance(lat, lng, lh.lat, lh.lng);
                if (dist < minDistance) {
                    minDistance = dist;
                    nearest = lh;
                }
            });
            return nearest;
        }

        function showAlert(msg) {
            document.getElementById('alert-msg').innerHTML = msg;
            document.getElementById('alert-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('alert-modal').style.display = 'none';
        }
    </script>
</body>
</html>
