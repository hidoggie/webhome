<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>🦀 AR 크랩 잡기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="./ARButton.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none}
body{background:transparent;font-family:'Segoe UI',sans-serif;cursor:crosshair;user-select:none}
canvas{display:block;position:fixed;top:0;left:0;z-index:1;touch-action:none}

/* ── HUD (UI 컨테이너) ── */
#ui-layer { position: fixed; inset: 0; z-index: 50; pointer-events: none; }
#hud{
  position:absolute;top:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:env(safe-area-inset-top,10px) 16px 10px;
  padding-top:max(env(safe-area-inset-top,0px),10px);
  background:linear-gradient(180deg,rgba(0,0,0,0.6) 0%,transparent 100%);
}
.hud-box{
  background:rgba(255,100,100,0.2); border:2px solid rgba(255,100,100,0.6);
  border-radius:12px;padding:6px 16px;text-align:center;
  backdrop-filter:blur(6px);min-width:72px;
}
.hlabel{font-size:9px;letter-spacing:2px;color:#ffcccc;text-transform:uppercase;opacity:.9}
.hval{font-size:clamp(24px,6vw,36px);font-weight:900;color:#fff;
  text-shadow:0 0 16px #ff4444,0 2px 4px rgba(0,0,0,.9);line-height:1.1}
#timer-wrap{flex:1;margin:0 12px;display:flex;flex-direction:column;align-items:center;gap:4px}
#tbar-bg{width:100%;height:11px;background:rgba(255,255,255,.12);border-radius:6px;
  overflow:hidden;border:1px solid rgba(255,255,255,.18)}
#tbar{height:100%;background:linear-gradient(90deg,#00ddff,#0066ff,#0000ff);
  border-radius:6px;transition:width .5s linear}
#ttime{font-size:12px;color:rgba(255,255,255,.8);letter-spacing:1px;font-weight:bold;text-shadow:0 1px 2px #000}

/* ── In-game feedback ── */
#combo{
  position:absolute;top:clamp(72px,14vw,100px);left:50%;transform:translateX(-50%);
  font-size:clamp(22px,6vw,30px);font-weight:900;color:#ff5500;
  text-shadow:0 0 28px #ff0000;opacity:0;transition:opacity .25s;
  letter-spacing:2px;white-space:nowrap;
}
#hitpop{
  position:absolute;top:50%;left:50%; transform:translate(-50%,-50%);
  font-size:clamp(36px,10vw,56px);font-weight:900;opacity:0;
  text-shadow:0 0 40px currentColor;transition:opacity .25s,transform .25s;
}

/* ── Overlay screens ── */
.screen{
  position:absolute;inset:0;pointer-events:auto;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,rgba(10,30,50,.9),rgba(0,10,20,.98));
  padding:20px; padding-bottom:max(env(safe-area-inset-bottom,20px),20px);
}
.big-title{
  font-size:clamp(38px,10vw,68px);font-weight:900;color:#ff7777;letter-spacing:3px;
  text-shadow:0 0 60px #ff0000,0 4px 8px rgba(0,0,0,.8);margin-bottom:4px;
  animation:pulse 2s ease-in-out infinite;text-align:center;
}
@keyframes pulse{
  0%,100%{text-shadow:0 0 60px #ff0000,0 4px 8px rgba(0,0,0,.8)}
  50%{text-shadow:0 0 110px #ff4444,0 0 44px #ffaaaa,0 4px 8px rgba(0,0,0,.8)}
}
.sub{font-size:clamp(14px,4vw,18px);color:rgba(255,200,200,.8);letter-spacing:3px;
  margin-bottom:clamp(30px,6vw,50px);text-align:center;line-height:1.4}
.gbtn{
  padding:clamp(14px,4vw,18px) clamp(36px,10vw,62px);
  font-size:clamp(16px,4.5vw,21px);font-weight:800;letter-spacing:3px;
  color:#fff;background:linear-gradient(135deg,#ff5555,#cc0000);
  border:2px solid #ffaaaa;border-radius:50px;cursor:pointer;min-height:52px;
  box-shadow:0 8px 32px rgba(255,0,0,.4),0 2px 8px rgba(0,0,0,.5);
  transition:.15s;text-transform:uppercase;-webkit-appearance:none;
}
.gbtn:active{transform:scale(0.96);box-shadow:0 4px 16px rgba(255,0,0,.3)}
.gbtn.success { background:linear-gradient(135deg,#00dd55,#008822); border-color:#aaffaa; box-shadow:0 8px 32px rgba(0,255,0,.4); }

.res-score{font-size:clamp(56px,16vw,88px);font-weight:900;color:#fff;margin-bottom:4px}
.res-sub{font-size:clamp(16px,4.5vw,20px);color:rgba(255,255,255,.9);letter-spacing:2px;
  margin-bottom:clamp(30px,7vw,50px);text-align:center;font-weight:bold}
.res-detail{
  display:flex;gap:20px;margin-bottom:clamp(24px,5vw,40px);
  font-size:clamp(13px,3.5vw,16px);color:rgba(255,200,200,.8);
}
.res-detail span{text-align:center;display:flex;flex-direction:column;gap:2px}
.res-detail b{font-size:clamp(18px,5vw,24px);color:#fff}

#tap-layer{ position:absolute;inset:0;pointer-events:auto;touch-action:none; }

.tap-ring{
  position:absolute; width:80px;height:80px; border-radius:50%;
  border:3px solid rgba(255,100,100,.8); margin:-40px 0 0 -40px;
  animation:tapRing .4s ease-out forwards; pointer-events:none;
}
@keyframes tapRing{ 0%{transform:scale(0.3);opacity:1} 100%{transform:scale(1.8);opacity:0} }

/* ── Top Buttons (Exit & Pause) ── */
.top-btn {
  position:absolute; top:max(env(safe-area-inset-top,10px),10px); z-index:55; pointer-events:auto;
  width:42px;height:42px;border-radius:50%;
  background:rgba(0,0,0,0.5);border:2px solid rgba(255,255,255,0.5);
  color:#fff;font-size:18px;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);-webkit-appearance:none;
}
#exit-btn { left: 16px; }
#pause-btn { right: 16px; }
.top-btn.visible { display:flex; }

/* ── AR Instruction Overlay ── */
#ar-instruction {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.7); color: #fff; padding: 15px 25px;
  border-radius: 30px; font-weight: bold; text-align: center; pointer-events: none;
  display: none; z-index: 100; white-space: nowrap; font-size: 16px;
}

#pause-overlay{
  position:absolute;inset:0;z-index:180;pointer-events:auto;
  background:rgba(0,0,0,0.85);backdrop-filter:blur(6px);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:24px;
}
#pause-overlay.show{display:flex}
#pause-overlay .ptitle{font-size:clamp(32px,9vw,50px);font-weight:900;color:#fff;
  text-shadow:0 0 20px rgba(255,255,255,0.5)}

#ARButton {
  position: static !important; margin-top: 20px;
  padding: clamp(14px,4vw,18px) clamp(36px,10vw,62px) !important;
  font-size: clamp(16px,4.5vw,21px) !important; font-weight: 800 !important;
  color: #fff !important; background: linear-gradient(135deg,#0077ff,#0033cc) !important;
  border: 2px solid #88bbff !important; border-radius: 50px !important;
  box-shadow: 0 8px 32px rgba(0,100,255,.5) !important; opacity: 1 !important;
}
</style>
</head>
<body>

<div id="ui-layer">
  <div id="ar-instruction">바닥을 천천히 비춰주세요...</div>

  <button id="exit-btn" class="top-btn" aria-label="나가기">❌</button>
  <button id="pause-btn" class="top-btn" aria-label="일시정지">⏸</button>

  <div id="hud" style="display:none;">
    <div class="hud-box"><div class="hlabel">점수</div><div class="hval" id="sc">0</div></div>
    <div id="timer-wrap">
      <div id="tbar-bg"><div id="tbar"></div></div>
      <div id="ttime">⏱ <span id="tsec">30</span>s</div>
    </div>
    <div class="hud-box"><div class="hlabel">목표</div><div class="hval">100</div></div>
  </div>

  <div id="combo">🔥 COMBO x<span id="cnum">2</span></div>
  <div id="hitpop"></div>

  <div id="tap-layer" style="display:none;"></div>

  <div class="screen" id="start-screen">
    <div class="big-title">🦀 AR 크랩 잡기</div>
    <div class="sub">100점 달성하고 포토존으로 가자!<br>(카메라 접근을 허용해주세요)</div>
  </div>

  <div class="screen" id="result-screen" style="display:none">
    <div class="big-title" id="res-title">🏆 게임 종료!</div>
    <div class="res-score" id="fscore">0</div>
    <div class="res-sub" id="res-sub">점 획득</div>
    <div class="res-detail">
      <span><div>최고기록</div><b id="res-best">0</b></span>
      <span><div>명중</div><b id="res-hits">0</b></span>
      <span><div>콤보</div><b id="res-combo">0</b></span>
    </div>
    <button class="gbtn" id="restartBtn">🔄 다시 하기</button>
  </div>

  <div id="pause-overlay">
    <div class="ptitle">⏸ 일시정지</div>
    <button class="gbtn" id="resumeBtn">▶ 계속하기</button>
  </div>
</div>

<script>
// ── Renderer & AR Setup ───────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x000000, 0); 
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

const arBtn = ARButton.createButton(renderer, {
    requiredFeatures: ['hit-test'],
    optionalFeatures: ['dom-overlay'],
    domOverlay: { root: document.getElementById('ui-layer') }
});
document.getElementById('start-screen').appendChild(arBtn);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(58,innerWidth/innerHeight,0.1,300);
camera.position.set(0, 0, 0);
scene.add(camera);

// ── AR Hit Test (바닥 인식용 레티클) ───────────────────────────────────────────
let hitTestSource = null;
let hitTestSourceRequested = false;
let boardPlaced = false;

const reticle = new THREE.Mesh(
    new THREE.RingGeometry(0.15, 0.2, 32).rotateX(-Math.PI / 2),
    new THREE.MeshBasicMaterial({ color: 0x00ff00 })
);
reticle.matrixAutoUpdate = false;
reticle.visible = false;
scene.add(reticle);

const worldGroup = new THREE.Group();
worldGroup.scale.set(0.6, 0.6, 0.6);
worldGroup.visible = false; // 배치 전까지 숨김
scene.add(worldGroup);

// 터치 시 게임 배치 (WebXR Controller Event)
const controller = renderer.xr.getController(0);
controller.addEventListener('select', () => {
    if (!boardPlaced && reticle.visible) {
        boardPlaced = true;
        // 레티클 위치로 게임판 이동
        worldGroup.position.setFromMatrixPosition(reticle.matrix);
        
        // 게임판이 사용자 카메라를 바라보게 설정 (Y축 회전만)
        const lookAtPos = camera.position.clone();
        lookAtPos.y = worldGroup.position.y;
        worldGroup.lookAt(lookAtPos);
        
        worldGroup.visible = true;
        reticle.visible = false;
        
        // 안내창 숨기고 터치 레이어 활성화 및 게임 시작
        document.getElementById('ar-instruction').style.display = 'none';
        document.getElementById('tap-layer').style.display = 'block';
        startGame();
    }
});
scene.add(controller);


// ── Lights ────────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const sun = new THREE.DirectionalLight(0xffe8b0, 1.5);
sun.position.set(6, 14, 8); 
sun.castShadow = true;
sun.shadow.mapSize.set(1024,1024);
worldGroup.add(sun);

// ── Materials ─────────────────────────────────────────────────────────────────
const MAT = {
  sand:   new THREE.MeshStandardMaterial({color:0xe3d3ad, roughness:1}),
  hole:   new THREE.MeshStandardMaterial({color:0x876b43, roughness:1}),
};

function add(parent,mesh,px,py,pz){
  mesh.position.set(px||0,py||0,pz||0);
  mesh.castShadow=true; mesh.receiveShadow=true;
  parent.add(mesh); return mesh;
}
function cyl(mat,rt,rb,h,seg=16){return new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg),mat)}

const crabTex = new THREE.TextureLoader().load('./img/crab.png');
function makeCrab(){
  const g = new THREE.Group();
  const mat = new THREE.SpriteMaterial({map: crabTex, color: 0xffffff});
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(1.4, 1.4, 1);
  sprite.position.y = 0.5; 
  g.add(sprite);

  function setFace(face){
    if(face === 'hit'){
      mat.color.setHex(0xff5555);
      sprite.scale.set(1.7, 0.9, 1);
    } else {
      mat.color.setHex(0xffffff);
      sprite.scale.set(1.4, 1.4, 1);
    }
  }
  return {group: g, setFace};
}

function makeHole(){
  const g = new THREE.Group();
  const mound = new THREE.Mesh(new THREE.SphereGeometry(0.75, 16, 10, 0, Math.PI*2, 0, Math.PI/2), MAT.sand);
  mound.scale.y = 0.3;
  g.add(mound);
  add(g, cyl(MAT.hole, 0.52, 0.45, 0.15, 24), 0, -0.05, 0);
  return g;
}

const malletRoot = new THREE.Group();
worldGroup.add(malletRoot);

const malletPivot = new THREE.Group();
malletRoot.add(malletPivot);

const MAT_HEAD = new THREE.MeshStandardMaterial({color:0xcc1a0a,roughness:0.4});
const MAT_HANDLE = new THREE.MeshStandardMaterial({color:0xe8a020,roughness:0.6});

const handleShaft = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.08, 3.0, 16), MAT_HANDLE);
handleShaft.rotation.x = Math.PI/2;
malletPivot.add(handleShaft);

const headGroup = new THREE.Group();
headGroup.position.z = -1.5;
malletPivot.add(headGroup);
const headCyl = new THREE.Mesh(new THREE.CylinderGeometry(0.65, 0.65, 1.25, 28), MAT_HEAD);
headGroup.add(headCyl);

const MALLET_REST_Y  = 4.2; 
const MALLET_STRIKE_Y = 0.7; 
malletRoot.position.y = MALLET_REST_Y;

const COLS=[-4,0,4], ROWS=[-3,0,3];
const MOLE_Y_DOWN=-1.0, MOLE_Y_UP=0.1;

const slots=[];
ROWS.forEach(z=>COLS.forEach(x=>{
  const hole=makeHole(); hole.position.set(x,0,z); worldGroup.add(hole);
  
  const moleGrp=new THREE.Group();
  const moleObj=makeCrab(); 
  moleGrp.add(moleObj.group);
  moleGrp.position.set(x,MOLE_Y_DOWN,z);
  worldGroup.add(moleGrp);

  const hitGeo=new THREE.SphereGeometry(1.0,8,8);
  const hitMat=new THREE.MeshBasicMaterial({transparent:true,opacity:0,depthWrite:false});
  const hitMesh=new THREE.Mesh(hitGeo,hitMat);
  hitMesh.position.y=0.5;
  moleGrp.add(hitMesh);

  const idx=slots.length;
  hitMesh.userData.slotIdx=idx;
  slots.push({grp:moleGrp,moleObj,hitMesh,up:false,targetY:MOLE_Y_DOWN,idx,hitTimer:null});
}));

let swinging=false, swingT=0, swingTargetIdx=-1, swingFired=false;

const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();

function findHitTarget(cx, cy) {
  mouse.x=(cx/innerWidth)*2-1;
  mouse.y=-(cy/innerHeight)*2+1;
  
  raycaster.setFromCamera(mouse, camera);
  const meshes=slots.map(s=>s.hitMesh);
  const hits=raycaster.intersectObjects(meshes, false);
  
  if(hits.length){
    const idx=hits[0].object.userData.slotIdx;
    if(slots[idx].up) return idx;
  }
  
  let bestIdx=-1, bestDist=Infinity;
  const W=innerWidth, H=innerHeight;
  slots.forEach((s,i)=>{
    if(!s.up) return;
    const wp=new THREE.Vector3();
    s.grp.getWorldPosition(wp);
    wp.y += 0.5;
    const ndc=wp.clone().project(camera);
    if(ndc.z > 1) return;
    const sx=(ndc.x+1)/2*W;
    const sy=(1-ndc.y)/2*H;
    const d=Math.hypot(cx-sx,cy-sy);
    if(d<bestDist){ bestDist=d; bestIdx=i; }
  });
  return bestDist<W*0.2 ? bestIdx : -1;
}

function triggerSwingAt(cx, cy){
  if(!GAME.running||swinging) return;
  const hitIdx = findHitTarget(cx, cy);

  swingTargetIdx=hitIdx;
  swinging=true; swingT=0; swingFired=false;

  if(hitIdx>=0){
    const s=slots[hitIdx];
    malletRoot.position.x=s.grp.position.x;
    malletRoot.position.z=s.grp.position.z;
  }

  const ring=document.createElement('div');
  ring.className='tap-ring';
  ring.style.left=cx+'px'; ring.style.top=cy+'px';
  document.getElementById('ui-layer').appendChild(ring);
  setTimeout(()=>ring.remove(),400);
}

const tapLayer = document.getElementById('tap-layer');
tapLayer.addEventListener('touchstart',e=>{
  e.preventDefault();
  triggerSwingAt(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
},{passive:false});
tapLayer.addEventListener('mousedown',e=>{
  triggerSwingAt(e.clientX, e.clientY);
});

// ── Game State ────────────────────────────────────────────────────────────────
const TARGET_SCORE = 100;
const GAME={
  score:0, best:parseInt(localStorage.getItem('crab_ar_best')||'0'),
  timeLeft:30, duration:30, running:false, paused:false,
  combo:0, maxCombo:0, hits:0, lastHit:0,
  timers:[], comboTimer:null,
  cfg: {interval:1000, showTime:1800, maxActive:3, pts:15}
};

// ── AR Session Management ─────────────────────────────────────────────────────
renderer.xr.addEventListener('sessionstart', () => {
  document.getElementById('start-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  
  // 게임 배치 대기 상태로 초기화
  boardPlaced = false;
  worldGroup.visible = false;
  reticle.visible = false;
  hitTestSourceRequested = false;
  hitTestSource = null;
  
  document.getElementById('ar-instruction').style.display = 'block';
  document.getElementById('ar-instruction').textContent = '바닥을 천천히 비춰주세요...';
  
  document.getElementById('exit-btn').classList.add('visible');
  document.getElementById('pause-btn').classList.remove('visible');
});

renderer.xr.addEventListener('sessionend', () => {
  endGame(true); // 강제 종료
  
  // UI 요소 초기화
  document.getElementById('start-screen').style.display='flex';
  document.getElementById('exit-btn').classList.remove('visible');
  document.getElementById('pause-btn').classList.remove('visible');
  document.getElementById('ar-instruction').style.display = 'none';
  document.getElementById('tap-layer').style.display = 'none';
  document.getElementById('hud').style.display = 'none';
  
  boardPlaced = false;
  worldGroup.visible = false;
  reticle.visible = false;
});

// 나가기(종료) 버튼 로직
document.getElementById('exit-btn').addEventListener('click', () => {
  const session = renderer.xr.getSession();
  if(session) session.end();
});

function startGame(){
  GAME.score=0; GAME.combo=0; GAME.maxCombo=0; GAME.hits=0;
  GAME.running=true; GAME.paused=false; GAME.timeLeft=GAME.duration;
  GAME.timers.forEach(clearTimeout); GAME.timers=[];
  slots.forEach(s=>{s.up=false; s.targetY=MOLE_Y_DOWN; s.moleObj.setFace('normal');});
  
  stopBGM(); startBGM();
  
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('pause-btn').classList.add('visible');
  updateHUD(); tickTimer(); spawnLoop();
}

function tickTimer(){
  const t=setTimeout(()=>{
    GAME.timeLeft--; updateHUD();
    if(GAME.timeLeft<=0) endGame(false); else tickTimer();
  },1000);
  GAME.timers.push(t);
}

function spawnLoop(){
  if(!GAME.running) return;
  if(slots.filter(s=>s.up).length < GAME.cfg.maxActive) spawnMole();
  const delay=GAME.cfg.interval*(0.6+Math.random()*0.8);
  const t=setTimeout(spawnLoop,delay);
  GAME.timers.push(t);
}

function spawnMole(){
  const avail=slots.filter(s=>!s.up);
  if(!avail.length) return;
  const s=avail[Math.floor(Math.random()*avail.length)];
  s.up=true; s.targetY=MOLE_Y_UP;
  playPop();
  const t=setTimeout(()=>{if(s.up) retract(s);}, GAME.cfg.showTime);
  GAME.timers.push(t);
}

function retract(s){
  s.up=false; s.targetY=MOLE_Y_DOWN;
  setTimeout(()=>s.moleObj.setFace('normal'),400);
}

function hitMole(idx){
  const s=slots[idx];
  const now=Date.now();
  if(now-GAME.lastHit<1600) GAME.combo++; else GAME.combo=1;
  GAME.lastHit=now; GAME.hits++;
  if(GAME.combo>GAME.maxCombo) GAME.maxCombo=GAME.combo;
  
  const pts=GAME.cfg.pts*Math.min(GAME.combo,5);
  GAME.score+=pts;
  
  s.moleObj.setFace('hit');
  clearTimeout(s.hitTimer);
  s.hitTimer=setTimeout(()=>s.moleObj.setFace('normal'),260);
  
  playHit();
  if(GAME.combo>=2) setTimeout(()=>playComboJingle(GAME.combo),80);
  
  showHitPop(pts); showCombo();
  retract(s); updateHUD();
}

function endGame(forced = false){
  GAME.running=false;
  GAME.timers.forEach(clearTimeout); GAME.timers=[];
  slots.forEach(s=>{s.up=false; s.targetY=MOLE_Y_DOWN;});
  stopBGM();
  
  document.getElementById('hud').style.display = 'none';
  document.getElementById('tap-layer').style.display = 'none';
  document.getElementById('pause-btn').classList.remove('visible');
  
  if(forced) return;
  
  setTimeout(playGameOver,200);
  if(GAME.score>GAME.best){
    GAME.best=GAME.score;
    localStorage.setItem('crab_ar_best',GAME.best);
  }
  
  setTimeout(()=>{
    document.getElementById('fscore').textContent=GAME.score;
    document.getElementById('res-best').textContent=GAME.best;
    document.getElementById('res-hits').textContent=GAME.hits;
    document.getElementById('res-combo').textContent=GAME.maxCombo;
    
    const rBtn = document.getElementById('restartBtn');
    if(GAME.score >= TARGET_SCORE) {
      document.getElementById('res-title').textContent = '🎉 목표 달성!';
      document.getElementById('res-sub').textContent = '포토존 스탬프 획득 성공!';
      rBtn.textContent = '📸 포토존으로 이동';
      rBtn.className = 'gbtn success';
      rBtn.onclick = () => { location.href = 'photozone.html'; };
    } else {
      document.getElementById('res-title').textContent = '💦 조금 아쉬워요';
      document.getElementById('res-sub').textContent = `실패! ${TARGET_SCORE}점 이상 필요합니다.`;
      rBtn.textContent = '🔄 다시 도전하기';
      rBtn.className = 'gbtn';
      rBtn.onclick = () => { 
        document.getElementById('result-screen').style.display='none';
        startGame(); 
      };
    }
    
    document.getElementById('result-screen').style.display='flex';
  },800);
}

function updateHUD(){
  document.getElementById('sc').textContent=GAME.score;
  const pct=Math.max(0,(GAME.timeLeft/GAME.duration)*100);
  document.getElementById('tbar').style.width=pct+'%';
  document.getElementById('tsec').textContent=GAME.timeLeft;
  document.getElementById('tbar').style.background=GAME.timeLeft<=5?'#ff2200':'linear-gradient(90deg,#00ddff,#0066ff,#0000ff)';
}

function showHitPop(pts){
  const el=document.getElementById('hitpop');
  const emojis=['💥','🦀','✨','🌊','💫'];
  el.textContent=`${emojis[Math.min(GAME.combo-1,4)]} +${pts}`;
  el.style.color=GAME.combo>2?'#ff0000':'#ffaaaa';
  el.style.opacity='1'; el.style.transform='translate(-50%,-50%) scale(1.2)';
  setTimeout(()=>{el.style.opacity='0'; el.style.transform='translate(-50%,-62%) scale(0.85)';},680);
}

function showCombo(){
  if(GAME.combo<2) return;
  const el=document.getElementById('combo');
  document.getElementById('cnum').textContent=GAME.combo;
  el.style.opacity='1';
  clearTimeout(GAME.comboTimer);
  GAME.comboTimer=setTimeout(()=>el.style.opacity='0',1100);
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden && GAME.running && !GAME.paused) pauseGame();
});

function pauseGame(){
  if(!GAME.running||GAME.paused) return;
  GAME.paused=true; GAME.running=false;
  stopBGM();
  GAME.timers.forEach(clearTimeout); GAME.timers=[];
  document.getElementById('pause-overlay').classList.add('show');
  document.getElementById('tap-layer').style.display = 'none';
}
function resumeGame(){
  if(!GAME.paused) return;
  GAME.paused=false; GAME.running=true;
  startBGM();
  document.getElementById('pause-overlay').classList.remove('show');
  document.getElementById('tap-layer').style.display = 'block';
  tickTimer(); spawnLoop();
}
document.getElementById('pause-btn').addEventListener('click', pauseGame);
document.getElementById('resumeBtn').addEventListener('click', resumeGame);


// ── Audio ─────────────────────────────────────────────────────────────────────
let actx, bgmPlaying=false, masterGain;
function getCtx(){
  if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
  return actx;
}
function getMaster(){
  const c=getCtx();
  if(!masterGain){masterGain=c.createGain();masterGain.gain.value=0.5;masterGain.connect(c.destination);}
  return masterGain;
}

function playHit(){
  try{
    const c=getCtx(), m=getMaster();
    const o2=c.createOscillator(); o2.type='square';
    o2.frequency.setValueAtTime(800,c.currentTime);
    o2.frequency.exponentialRampToValueAtTime(100,c.currentTime+0.1);
    const g2=c.createGain(); g2.gain.setValueAtTime(0.4,c.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.12);
    o2.connect(g2); g2.connect(m); o2.start(); o2.stop(c.currentTime+0.12);
  }catch(e){}
}
function playPop(){
  try{
    const c=getCtx(),m=getMaster();
    const o=c.createOscillator(); o.type='sine';
    o.frequency.setValueAtTime(300,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(600,c.currentTime+0.1);
    const g=c.createGain(); g.gain.setValueAtTime(0.3,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.15);
    o.connect(g); g.connect(m); o.start(); o.stop(c.currentTime+0.15);
  }catch(e){}
}
function playMiss(){
  try{
    const c=getCtx(),m=getMaster();
    const o=c.createOscillator(); o.type='sawtooth';
    o.frequency.setValueAtTime(200,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(80,c.currentTime+0.2);
    const g=c.createGain(); g.gain.setValueAtTime(0.2,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.2);
    o.connect(g); g.connect(m); o.start(); o.stop(c.currentTime+0.2);
  }catch(e){}
}
function playComboJingle(level){
  try{
    const c=getCtx(),m=getMaster();
    const notes=[523,659,784,1047,1319];
    const n=Math.min(level,notes.length);
    for(let i=0;i<n;i++){
      const o=c.createOscillator(); o.type='sine'; o.frequency.value=notes[i];
      const g=c.createGain(); const st=c.currentTime+i*0.05;
      g.gain.setValueAtTime(0,st); g.gain.linearRampToValueAtTime(0.2,st+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,st+0.1);
      o.connect(g); g.connect(m); o.start(st); o.stop(st+0.12);
    }
  }catch(e){}
}
function playGameOver(){
  try{
    const c=getCtx(),m=getMaster();
    [[196,0],[220,0.15],[175,0.3],[165,0.5]].forEach(([f,t])=>{
      const o=c.createOscillator(); o.type='triangle'; o.frequency.value=f;
      const g=c.createGain(); g.gain.setValueAtTime(0,c.currentTime+t);
      g.gain.linearRampToValueAtTime(0.3,c.currentTime+t+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+t+0.3);
      o.connect(g); g.connect(m); o.start(c.currentTime+t); o.stop(c.currentTime+t+0.32);
    });
  }catch(e){}
}

let bgmNodes=[], bgmScheduler=null, bgmBeat=0;
const BGM_BEAT=60/148;
function startBGM(){
  if(bgmPlaying) return; bgmPlaying=true; bgmBeat=0; scheduleBGM();
}
function stopBGM(){
  bgmPlaying=false; if(bgmScheduler) clearTimeout(bgmScheduler);
  bgmNodes.forEach(n=>{try{n.stop();}catch(e){}}); bgmNodes=[];
}
function scheduleBGM(){
  if(!bgmPlaying) return;
  const c=getCtx(), m=getMaster(), now=c.currentTime;
  if(bgmBeat%2===0){
    const bo=c.createOscillator(); bo.type='triangle'; bo.frequency.value=130;
    const bg=c.createGain(); bg.gain.setValueAtTime(0.15,now); bg.gain.exponentialRampToValueAtTime(0.001,now+BGM_BEAT*1.8);
    bo.connect(bg); bg.connect(m); bo.start(now); bo.stop(now+BGM_BEAT*2); bgmNodes.push(bo);
  }
  bgmBeat++;
  if(bgmNodes.length>40) bgmNodes.splice(0,20);
  bgmScheduler=setTimeout(scheduleBGM, BGM_BEAT*1000*0.92);
}

// ── Render Loop ───────────────────────────────────────────────────────────────
const clock=new THREE.Clock();

function animate(timestamp, frame){
  const dt=Math.min(clock.getDelta(),0.05);
  
  // AR 바닥 인식 처리
  if (frame && !boardPlaced) {
    const session = renderer.xr.getSession();
    if (!hitTestSourceRequested) {
      session.requestReferenceSpace('viewer').then((refSpace) => {
        session.requestHitTestSource({ space: refSpace }).then((source) => {
          hitTestSource = source;
        });
      });
      hitTestSourceRequested = true;
    }

    if (hitTestSource) {
      const referenceSpace = renderer.xr.getReferenceSpace();
      const hitTestResults = frame.getHitTestResults(hitTestSource);
      
      if (hitTestResults.length > 0) {
        const hit = hitTestResults[0];
        const pose = hit.getPose(referenceSpace);
        
        reticle.visible = true;
        reticle.matrix.fromArray(pose.transform.matrix);
        document.getElementById('ar-instruction').textContent = '화면을 터치하여 게임을 배치하세요!';
      } else {
        reticle.visible = false;
        document.getElementById('ar-instruction').textContent = '바닥을 천천히 비춰주세요...';
      }
    }
  }
  
  slots.forEach((s)=>{
    const dy=s.targetY-s.grp.position.y;
    s.grp.position.y+=dy*Math.min(1,dt*12);
  });

  if(swinging){
    swingT += dt*14;
    const progress = Math.sin(swingT);
    malletRoot.position.y = MALLET_REST_Y - (MALLET_REST_Y - MALLET_STRIKE_Y) * progress;
    if(progress > 0.85 && !swingFired){
      swingFired = true;
      if(swingTargetIdx >= 0 && slots[swingTargetIdx].up) hitMole(swingTargetIdx);
      else playMiss();
      swingTargetIdx = -1;
    }
    if(swingT >= Math.PI){
      swinging = false; swingFired = false;
      malletRoot.position.y = MALLET_REST_Y;
    }
  }

  renderer.render(scene,camera);
}

renderer.setAnimationLoop(animate);

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
