<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Lumi vs Mumu - AR Auth</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{overflow:hidden;background:#000;font-family:'Arial Black',Arial,sans-serif;touch-action:none;}

/* 웹캠(카메라) 배경 */
#webcam {position:fixed;top:0;left:0;width:100vw;height:100vh;object-fit:cover;z-index:1;}

/* Three.js 렌더링 캔버스 (투명) */
canvas{position:fixed;top:0;left:0;display:block;width:100vw;height:100vh;z-index:5;}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:20;}
#hud-top{display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;background:rgba(0,0,0,0.6);}
#score-box{color:#f4a025;font-size:22px;font-weight:900;text-shadow:0 0 12px #f4a025;}
#goal-box{color:#fff;font-size:15px;font-weight:700;}
#time-box{color:#ff5252;font-size:20px;font-weight:900;text-shadow:0 0 10px #ff0000;}

/* 남은 기회 표시 */
#ammo-box{display:flex;gap:4px;align-items:center; position:absolute; top:55px; left:16px;}
.aball{width:16px;height:16px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#ffcccb,#f44336);
  border:2px solid #fff;box-shadow:0 0 8px rgba(244,67,54,.8);}
.aball.used{background:rgba(60,60,60,.6);border-color:rgba(255,255,255,.2);box-shadow:none;}

/* ── 터치 조준점 및 원형 파워 게이지 ── */
#touch-aim {
  position: fixed;
  top: 0; left: 0;
  width: 80px; height: 80px;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: 100;
  display: none; /* 평소엔 숨기고 터치 시에만 표시 */
  border-radius: 50%;
  background: rgba(0, 0, 0, 0.2);
}

/* 게이지 채우기 (진행도에 따라 색상이 차오름) */
#touch-aim::before {
  content: '';
  position: absolute;
  inset: -6px; /* 테두리 두께 */
  border-radius: 50%;
  /* 자바스크립트에서 변경하는 --p 변수값에 따라 게이지가 채워짐 */
  background: conic-gradient(#00e676 var(--p, 0%), transparent 0);
  -webkit-mask: radial-gradient(transparent 36px, #000 37px);
  mask: radial-gradient(transparent 36px, #000 37px);
}

/* 중앙 십자 조준선 */
#touch-aim::after {
  content: '✛';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  color: rgba(255, 255, 255, 0.8);
  font-size: 32px;
  text-shadow: 0 0 5px #000;
}

/* ── START HINT ── */
#start-hint{position:fixed;top:100px;left:50%;transform:translateX(-50%);
  color:#00e676;font-size:16px;font-weight:900;text-shadow:0 0 10px #00e676;
  pointer-events:none;z-index:20;animation: pulse 1s infinite alternate; text-align:center;}
@keyframes pulse { 0% { opacity: 0.5; transform: translateX(-50%) scale(0.95); } 100% { opacity: 1; transform: translateX(-50%) scale(1.05); } }
#start-hint.hide { display: none; }

/* ── AUDIO CONTROLS ── */
#audio-btn{position:fixed;top:55px;right:16px;z-index:30;
  width:42px;height:42px;border-radius:50%;border:2px solid rgba(255,255,255,.4);
  background:rgba(0,0,0,.55);color:#fff;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);transition:background .2s;pointer-events:all;}

/* ── CROSSHAIR ── */
#xhair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:30px;height:30px;pointer-events:none;z-index:20;}
#xhair::before,#xhair::after{content:'';position:absolute;background:rgba(255,255,255,.75);border-radius:1px;}
#xhair::before{width:2px;height:100%;left:50%;top:0;transform:translateX(-50%);}
#xhair::after{width:100%;height:2px;top:50%;left:0;transform:translateY(-50%);}
#xdot{position:absolute;width:5px;height:5px;background:#00e676;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);box-shadow:0 0 6px #00e676;}

/* ── FLASHES & POPUP ── */
.flash{position:fixed;inset:0;opacity:0;pointer-events:none;z-index:15;transition:opacity .15s;}
#fhit{background:rgba(0,255,255,.3);}
#fmiss{background:rgba(255,0,0,.18);}
#spop{position:fixed;top:35%;left:50%;transform:translate(-50%,-50%);
  font-size:52px;font-weight:900;color:#00e676;text-shadow:0 0 24px #00e676,3px 3px 0 #000;
  opacity:0;pointer-events:none;z-index:25;transition:opacity .4s,transform .4s;}

/* ── OVERLAY ── */
#overlay{position:fixed;inset:0;z-index:50;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse,#1a0a3e,#050210);}
#overlay.off{display:none;}
.ot{font-size:clamp(30px,6vw,60px);font-weight:900;color:#ff5252;text-shadow:0 0 36px #ff5252,4px 4px 0 #5a0000;margin-bottom:6px;text-align:center;}
.os{font-size:18px;color:#4fc3f7;margin-bottom:28px;}
.oi{color:rgba(255,255,255,.8);font-size:14px;line-height:1.8;text-align:center;
  background:rgba(255,255,255,.1);padding:16px 24px;border-radius:12px;border:1px solid rgba(255,255,255,.2);margin-bottom:24px;}
.obtn{padding:14px 42px;font-size:20px;font-weight:900;
  background:linear-gradient(135deg,#ff5252,#c80000);color:#fff;
  border:none;border-radius:50px;cursor:pointer;box-shadow:0 8px 24px rgba(244,67,54,.5);
  text-transform:uppercase;letter-spacing:2px;transition:transform .18s;}
.obtn:hover,.obtn:active{transform:scale(1.07);}
</style>
</head>
<body>

<video id="webcam" autoplay playsinline></video>
<canvas id="c"></canvas>

<div id="hud">
  <div id="hud-top">
    <div id="score-box">✨ <span id="sc">0</span></div>
    <div id="goal-box">목표: 1000점</div>
    <div id="time-box">⏱️ <span id="time-val">30</span>초</div>
  </div>
  <div id="ammo-box"></div>
</div>

<div id="start-hint">터치하여 당기면<br>타이머 시작!</div>

<div id="touch-aim" style="--p: 0%;"></div>

<button id="audio-btn" title="음소거">🔊</button>
<div id="xhair"><div id="xdot"></div></div>
<div class="flash" id="fhit"></div>
<div class="flash" id="fmiss"></div>
<div id="spop"></div>

<div id="overlay">
  <div class="ot">LUMI vs MUMU</div>
  <div class="os">✨ 빛의 수호자 출동! 해무를 정화하라</div>
  <div class="oi">
    ⏱️ <b>제한 시간:</b> 30초 (터치 시 시작)<br>
    🎯 <b>기회:</b> 총 10번의 루미 발사!<br>
    🔵 <b>작은 무무일수록 점수가 높습니다.</b><br>
    ✨ <b>1000점</b>을 달성하여 등대를 지켜내세요!
  </div>
  <button class="obtn" id="startBtn">전투 시작! 🚀</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
//  게임 설정
// ═══════════════════════════════════════════════════════
const GOAL_SCORE = 1000;
const MAX_TIME = 30; 
const MAX_AMMO = 10; 
const AUTH_REDIRECT_URL = 'ncmap.html';

const canvas = document.getElementById('c');
const video = document.getElementById('webcam');
const W = () => window.innerWidth;
const H = () => window.innerHeight;

const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.setClearColor(0x000000, 0);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, W()/H(), 0.05, 300);
camera.position.set(0, 0.5, 0);

window.addEventListener('resize', () => {
  renderer.setSize(W(), H());
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
});

scene.add(new THREE.AmbientLight(0xffffff, 0.9));
const sun = new THREE.DirectionalLight(0xffffff, 0.8);
sun.position.set(5, 10, 5);
scene.add(sun);

// ═══════════════════════════════════════════════════════
//  텍스처 로드 및 3D 모델 헬퍼 함수
// ═══════════════════════════════════════════════════════
const textureLoader = new THREE.TextureLoader();
const texLumi = textureLoader.load('./img/lumi.png'); 
const texMumu = textureLoader.load('./img/mumu.png');

const D2R = v => v*Math.PI/180;

// 🌟 오리지널 새총 복원을 위한 3D 에셋 헬퍼 함수
const MAT = (color) => new THREE.MeshLambertMaterial({color});
const SPH = (r, color, seg=12) => new THREE.Mesh(new THREE.SphereGeometry(r, seg, seg), MAT(color));
const CYL = (rt, rb, h, color, seg=10) => new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, seg), MAT(color));

function place(parent, mesh, x, y, z, rx=0, ry=0, rz=0, sx=1, sy=sx, sz=sx){
  mesh.position.set(x,y,z); mesh.rotation.set(rx,ry,rz); mesh.scale.set(sx,sy,sz);
  parent.add(mesh); return mesh;
}

// 루미 (발사체) - 크기 1.5배 확대 (2.5 -> 3.8)
function makeLumi3D(s) {
  const mat = new THREE.SpriteMaterial({ map: texLumi, color: 0xffffff, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.renderOrder = 10;
  sprite.scale.set(s * 3.8, s * 3.8, 1); // 🌟 1.5배 커진 루미
  return sprite;
}

// 무무 (타겟)
function makeMumu3D(tier) {
  let s, pts;
  if(tier === 1) { s = 0.5; pts = 100; }      // 대형 무무
  else if(tier === 2) { s = 0.35; pts = 200; }// 중형 무무
  else { s = 0.2; pts = 300; }                // 소형 무무

  const mat = new THREE.SpriteMaterial({ map: texMumu, color: 0xffffff, transparent: true });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(s * 3.5, s * 3.5, 1);
  return { mesh: sprite, s, pts };
}

// 🌟 오리지널 새총 구조 및 고무줄 100% 복원
let slingshotGroup = new THREE.Group();
let bandLMesh, bandRMesh, pouch;
const LEFT_TIP = new THREE.Vector3(-.48, .98, 0);
const RIGHT_TIP = new THREE.Vector3(.48, .98, 0);

function buildSlingshot() {
  const handle = CYL(.07, .09, 1.0, 0x6d4c41, 8);
  place(slingshotGroup, handle, 0, -.3, 0);
  [-.2, 0, .2].forEach(dy => { const r = CYL(.11, .11, .07, 0x5d4037, 8); r.position.set(0, -.3+dy, 0); slingshotGroup.add(r); });
  
  const leftArm = new THREE.Group(); const laShaft = CYL(.055, .065, 1.1, 0x8d6e63, 8); laShaft.position.y = .55; leftArm.add(laShaft);
  leftArm.position.set(-.08, .15, 0); leftArm.rotation.z = D2R(28); leftArm.rotation.x = D2R(-5); slingshotGroup.add(leftArm);
  
  const rightArm = new THREE.Group(); const raShaft = CYL(.055, .065, 1.1, 0x8d6e63, 8); raShaft.position.y = .55; rightArm.add(raShaft);
  rightArm.position.set(.08, .15, 0); rightArm.rotation.z = D2R(-28); rightArm.rotation.x = D2R(-5); slingshotGroup.add(rightArm);
  
  place(slingshotGroup, SPH(.08, 0x4e342e, 7), -.48, .98, 0);
  place(slingshotGroup, SPH(.08, 0x4e342e, 7), .48, .98, 0);

  // 탄력 넘치는 노란색 고무줄 복구
  const bandMat = new THREE.MeshLambertMaterial({color: 0xffd600});
  bandLMesh = new THREE.Mesh(new THREE.CylinderGeometry(.025,.025,1,6), bandMat);
  bandRMesh = new THREE.Mesh(new THREE.CylinderGeometry(.025,.025,1,6), bandMat);
  slingshotGroup.add(bandLMesh); slingshotGroup.add(bandRMesh);

  pouch = makeLumi3D(.14); // 거대해진 장전용 루미
  slingshotGroup.add(pouch);
  
  slingshotGroup.position.set(0, -1.8, -2.8);
  scene.add(slingshotGroup);
}
buildSlingshot();

function updateBands(pouchLocalPos) {
  function updateBand(mesh, from, to) {
    const mid = new THREE.Vector3().addVectors(from, to).multiplyScalar(.5); mesh.position.copy(mid);
    const dir = new THREE.Vector3().subVectors(to, from); mesh.scale.set(1, dir.length(), 1);
    mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
  }
  updateBand(bandLMesh, LEFT_TIP, pouchLocalPos); updateBand(bandRMesh, RIGHT_TIP, pouchLocalPos);
}

// ═══════════════════════════════════════════════════════
//  GAME STATE & LOGIC
// ═══════════════════════════════════════════════════════
const G = {
  score: 0, ammo: MAX_AMMO, timeLeft: MAX_TIME,
  birds: [], projs: [], running: false, isGameOverCheck: false,
  hasStarted: false,
  dragging: false, dragStart: {x:0, y:0}, dragCur: {x:0, y:0}, power: 0, clickX: 0, clickY: 0
};
const pouchOffset = new THREE.Vector3(0, .65, 0);

const $sc = document.getElementById('sc');
const $time = document.getElementById('time-val');
const $ammo = document.getElementById('ammo-box');
const $touchAim = document.getElementById('touch-aim');
const $fhit = document.getElementById('fhit');
const $fmiss = document.getElementById('fmiss');
const $spop = document.getElementById('spop');
const $ov = document.getElementById('overlay');
const $ahint = document.getElementById('angle-hint');
const $startHint = document.getElementById('start-hint');

function startCamera() {
  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
      .then(stream => { video.srcObject = stream; })
      .catch(err => { console.warn("웹캠 권한 거부", err); });
  }
}

document.getElementById('startBtn').addEventListener('click', () => {
  if(!masterGain) initAudio(); sfxClick();
  restartGame();
});

function restartGame() {
  $ov.classList.add('off');
  $startHint.classList.remove('hide');
  startCamera();
  startBGM();
  
  G.score = 0; 
  G.ammo = MAX_AMMO; 
  G.timeLeft = MAX_TIME;
  G.isGameOverCheck = false;
  G.hasStarted = false; 
  
  G.projs.forEach(p => scene.remove(p.mesh));
  G.projs = [];
  
  refreshHUD();
  spawnMumus();
  G.running = true;
}

function getEventXY(e){
  if(e.touches && e.touches.length>0) return {x:e.touches[0].clientX, y:e.touches[0].clientY};
  if(e.changedTouches && e.changedTouches.length>0) return {x:e.changedTouches[0].clientX, y:e.changedTouches[0].clientY};
  return {x:e.clientX, y:e.clientY};
}

function screenToDir(sx, sy){
  const ndc = new THREE.Vector2((sx/W())*2-1, -(sy/H())*2+1);
  const ray = new THREE.Raycaster(); ray.setFromCamera(ndc, camera);
  return ray.ray.direction.clone().normalize();
}

function onDragStart(e) {
  if (!G.running || G.ammo <= 0) return;
  
  if (!G.hasStarted) {
    G.hasStarted = true;
    $startHint.classList.add('hide');
  }

  const {x, y} = getEventXY(e);
  G.dragging = true; G.clickX = x; G.clickY = y;
  G.dragStart = {x, y}; G.dragCur = {x, y}; G.power = 0;
  
  // 🌟 첫 터치 지점에 조준점 표시 및 게이지 초기화
  $touchAim.style.left = x + 'px';
  $touchAim.style.top = y + 'px';
  $touchAim.style.display = 'block';
  $touchAim.style.setProperty('--p', '0%');
  
  sfxPullStart();
}

function onDragMove(e) {
  if (!G.running || !G.dragging) return;
  const {x, y} = getEventXY(e);
  G.dragCur = {x, y};
  const dx = G.dragCur.x - G.dragStart.x;
  const dy = G.dragCur.y - G.dragStart.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const maxDrag = Math.min(W(), H()) * 0.30;
  G.power = Math.min(1, dist/maxDrag);
  sfxPullUpdate(G.power);
  
  // 🌟 드래그한 거리에 비례하여 원형 게이지(%) 채우기
  $touchAim.style.setProperty('--p', (G.power * 100) + '%');
  
  pouchOffset.set(0, 0.65 - G.power * 0.3, G.power * 0.45);
}

function onDragEnd(e) {
  if (!G.running || !G.dragging) return;
  G.dragging = false; 
  
  // 🌟 손을 떼면 조준점 숨기기
  $touchAim.style.display = 'none';
  
  sfxPullRelease();

  if (G.power < 0.05) { pouchOffset.set(0, .65, 0); return; }

  fireLumi(G.power, G.clickX, G.clickY);
  G.ammo--; 
  refreshHUD();
  pouchOffset.set(0, .65, 0);
}

canvas.addEventListener('mousedown', onDragStart);
canvas.addEventListener('mousemove', onDragMove);
canvas.addEventListener('mouseup', onDragEnd);
canvas.addEventListener('mouseleave', onDragEnd);
canvas.addEventListener('touchstart', onDragStart, {passive:false});
canvas.addEventListener('touchmove', onDragMove, {passive:false});
canvas.addEventListener('touchend', onDragEnd, {passive:false});
canvas.addEventListener('touchcancel', onDragEnd, {passive:false});

function fireLumi(power, screenX, screenY) {
  const dir = screenToDir(screenX, screenY);
  dir.y += 0.15; 
  dir.normalize();

  const spd = 6.0 + power * 16.0; 
  const vx = dir.x * spd, vy = dir.y * spd, vz = dir.z * spd;

  const startPos = new THREE.Vector3(slingshotGroup.position.x, slingshotGroup.position.y+0.65, slingshotGroup.position.z-0.3);
  const lumi = makeLumi3D(0.2); 
  lumi.position.copy(startPos); 
  scene.add(lumi);

  G.projs.push({mesh:lumi, x:startPos.x, y:startPos.y, z:startPos.z, vx, vy, vz, alive:true, age:0});

  sfxFire(); sfxFlight();
  slingshotGroup.position.z = -2.4;
  setTimeout(() => slingshotGroup.position.z = -2.8, 130);
}

function spawnMumus() {
  G.birds.forEach(b => scene.remove(b.mesh)); G.birds = [];
  const counts = [0, 5, 5, 5]; 
  
  for(let tier=1; tier<=3; tier++) {
    for (let i = 0; i < counts[tier]; i++) {
      const mumuData = makeMumu3D(tier);
      const mesh = mumuData.mesh;
      
      const wx = (Math.random() - .5) * 14;
      const wy = 0.5 + Math.random() * 4.0; 
      const wz = -8 - Math.random() * 10;
      mesh.position.set(wx, wy, wz); scene.add(mesh);

      G.birds.push({
        mesh, wx, wy, wz, vx: (Math.random()-.5)*.02, vz: (Math.random()-.5)*.01,
        phase: Math.random()*Math.PI*2, fSpd: .5+Math.random()*.5, fAmp: .15+Math.random()*.15,
        rotSpd: (Math.random()-.5)*2.0, rotY: 0, alive: true, dying: false,
        dyingVx: 0, dyingVy: 0, dyingVz: 0, pts: mumuData.pts, r: mumuData.s * 1.8, curY: wy, dyAge: 0
      });
    }
  }
}

function spawnMumuParticles(wx, wy, wz) {
  for (let i=0; i<20; i++) {
    const geo = new THREE.SphereGeometry(0.05 + Math.random()*0.05, 8, 8);
    const mat = new THREE.MeshBasicMaterial({color: Math.random() > 0.5 ? 0x00ffff : 0xffffff, transparent:true, opacity:1});
    const p = new THREE.Mesh(geo, mat);
    p.position.set(wx, wy, wz);
    
    const vx = (Math.random()-.5)*.25, vy = .1+Math.random()*.2, vz = (Math.random()-.5)*.25;
    scene.add(p); let age=0;
    const id = setInterval(() => {
      if(!G.running) return;
      age += .04; p.position.x += vx; p.position.y += vy - 9.8*.003*age*age; p.position.z += vz; 
      p.material.opacity = Math.max(0, 1-age*1.2);
      if (age > 1.2) { clearInterval(id); scene.remove(p); }
    }, 40);
  }
}

function hitMumu(b, p) {
  if (b.dying || !b.alive || !p.alive) return;
  b.alive=false; p.alive=false; scene.remove(p.mesh);
  G.score += b.pts; refreshHUD();
  flash($fhit); sfxBirdHit(); sfxScore(); showPop('+' + b.pts);

  b.dying = true; b.dyAge = 0; b.dyingVx = (Math.random()-.5)*.12; b.dyingVy = .15+Math.random()*.1; b.dyingVz = (Math.random()-.5)*.1;
  spawnMumuParticles(b.wx, b.curY, b.wz);
}

function triggerGameOver() {
  if(G.isGameOverCheck) return;
  G.isGameOverCheck = true;
  G.running = false;
  stopBGM();

  setTimeout(() => {
    if (G.score >= GOAL_SCORE) {
      sfxLevelClear();
      if (confirm(`🎉 목표 달성! (최종 점수: ${G.score}점)\n\n인증 맵으로 이동하시겠습니까?\n'취소'를 누르면 다시 플레이합니다.`)) {
        window.location.href = AUTH_REDIRECT_URL;
      } else {
        restartGame();
      }
    } else {
      sfxGameOver();
      alert(`😢 실패! (최종 점수: ${G.score}점)\n시간 종료 또는 루미 파워를 모두 소진했습니다.\n다시 도전하세요!`);
      restartGame();
    }
  }, 500);
}

function refreshHUD() { 
  $sc.textContent = G.score; 
  $time.textContent = Math.ceil(G.timeLeft);
  
  $ammo.innerHTML = '';
  for (let i=0; i<MAX_AMMO; i++) {
    const d = document.createElement('div');
    d.className = 'aball' + (i >= G.ammo ? ' used' : ''); $ammo.appendChild(d);
  }
}

function flash(el) { el.style.opacity = '1'; setTimeout(() => el.style.opacity = '0', 160); }
function showPop(t) {
  $spop.textContent = t; $spop.style.opacity = '1'; $spop.style.transform = 'translate(-50%,-50%) scale(1.2)';
  setTimeout(() => { $spop.style.opacity = '0'; $spop.style.transform = 'translate(-50%,-75%) scale(.85)'; }, 900);
}

// ═══════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════
let prev = performance.now();
function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now - prev) / 1000, .05); prev = now;

  if (!G.running) { renderer.render(scene, camera); return; }

  if (G.hasStarted && G.timeLeft > 0) {
    G.timeLeft -= dt;
    if (G.timeLeft <= 0) {
      G.timeLeft = 0;
      refreshHUD();
      triggerGameOver();
    } else {
      refreshHUD();
    }
  }

  pouch.position.copy(pouchOffset); updateBands(pouchOffset);

  G.birds.forEach(b => {
    if (b.dying) {
      b.dyAge += dt; b.dyingVy -= dt * 9.8 * .08; b.wx += b.dyingVx; b.curY += b.dyingVy; b.wz += b.dyingVz;
      b.mesh.position.set(b.wx, b.curY, b.wz);
      b.mesh.scale.setScalar(Math.max(0.01, 1 - b.dyAge)); 
      if (b.dyAge > 1.0) { scene.remove(b.mesh); b.dying = false; } return;
    }
    if (!b.alive) return;
    b.wx += b.vx; b.wz += b.vz; b.phase += dt * b.fSpd; b.curY = b.wy + Math.sin(b.phase) * b.fAmp; 
    if (Math.abs(b.wx) > 12) b.vx *= -1; if (b.wz > -4 || b.wz < -18) b.vz *= -1;
    b.mesh.position.set(b.wx, b.curY, b.wz); 
    b.mesh.material.rotation = Math.sin(b.phase) * 0.15; 
  });

  let flyingCount = 0;
  G.projs.forEach(p => {
    if (!p.alive) return;
    flyingCount++;
    p.age += dt; p.vy -= 6.0 * dt; 
    
    p.x += p.vx * dt; p.y += p.vy * dt; p.z += p.vz * dt;
    p.mesh.position.set(p.x, p.y, p.z); 
    p.mesh.material.rotation += dt * 10; 

    if (p.y < -3.0) { scene.remove(p.mesh); p.alive = false; flash($fmiss); sfxMiss(); return; }
    if (p.age > 8 || p.z < -28) { scene.remove(p.mesh); p.alive = false; return; }
    
    G.birds.forEach(b => {
      if (!b.alive || !p.alive) return;
      const dx=p.x-b.wx, dy=p.y-b.curY, dz=p.z-b.wz;
      if (dx*dx + dy*dy + dz*dz < (b.r+.4)*(b.r+.4)) hitMumu(b, p);
    });
  });

  if (G.hasStarted && G.ammo <= 0 && flyingCount === 0 && !G.isGameOverCheck && G.timeLeft > 0) {
    triggerGameOver();
  }

  if (G.birds.length > 0 && G.birds.every(b => !b.alive && !b.dying)) { spawnMumus(); }

  renderer.render(scene, camera);
}
requestAnimationFrame(animate);

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    if (G.running) { G.running = false; stopBGM(); if (AC && AC.state === 'running') AC.suspend(); video.pause(); }
  } else {
    if ($ov.classList.contains('off') && !G.isGameOverCheck) {
      G.running = true; startBGM(); if (AC && AC.state === 'suspended') AC.resume(); video.play();
    }
  }
});

// ═══════════════════════════════════════════════════════
//  WEB AUDIO ENGINE
// ═══════════════════════════════════════════════════════
const AC = new (window.AudioContext || window.webkitAudioContext)();
let masterGain, bgmGain, sfxGain, bgmNodes = [];

function initAudio() {
  if(AC.state === 'suspended') AC.resume();
  masterGain = AC.createGain(); masterGain.gain.value = 1; masterGain.connect(AC.destination);
  bgmGain = AC.createGain(); bgmGain.gain.value = 0.25; bgmGain.connect(masterGain);
  sfxGain = AC.createGain(); sfxGain.gain.value = 0.85; sfxGain.connect(masterGain);
}

function startBGM() {
  stopBGM();
  if (AC.state === 'suspended') return;
  const BPM = 120, beat = 60 / BPM;
  const CHORDS = [[261.63, 329.63, 392.00, 523.25], [349.23, 440.00, 523.25, 698.46], [392.00, 493.88, 587.33, 783.99], [220.00, 277.18, 329.63, 440.00]];
  const BASS = [130.81, 174.61, 196.00, 110.00];
  let t = AC.currentTime + 0.05;
  const loopLen = CHORDS.length * beat * 4;

  function scheduleLoop() {
    if (!G.running) return;
    const loopStart = t;
    CHORDS.forEach((chord, ci) => {
      const cStart = loopStart + ci * beat * 4;
      [0, 2].forEach(b => {
        const o = AC.createOscillator(); const g = AC.createGain(); o.type = 'triangle'; o.frequency.value = BASS[ci];
        g.gain.setValueAtTime(0, cStart + b * beat); g.gain.linearRampToValueAtTime(0.4, cStart + b * beat + 0.02); g.gain.exponentialRampToValueAtTime(0.001, cStart + b * beat + beat * 0.85);
        o.connect(g); g.connect(bgmGain); o.start(cStart + b * beat); o.stop(cStart + b * beat + beat * 0.9); bgmNodes.push(o);
      });
      chord.forEach(freq => {
        const o = AC.createOscillator(); const g = AC.createGain(); o.type = 'sine'; o.frequency.value = freq;
        g.gain.setValueAtTime(0, cStart); g.gain.linearRampToValueAtTime(0.05, cStart + 0.08); g.gain.setValueAtTime(0.05, cStart + beat * 3.5); g.gain.linearRampToValueAtTime(0, cStart + beat * 4);
        o.connect(g); g.connect(bgmGain); o.start(cStart); o.stop(cStart + beat * 4 + 0.1); bgmNodes.push(o);
      });
      const MELODY = [[523.25, 0], [587.33, 0.5], [659.26, 1], [587.33, 1.5], [523.25, 2], [493.88, 2.5], [440.00, 3], [493.88, 3.5]];
      MELODY.forEach(([freq, offset]) => {
        const o = AC.createOscillator(); const g = AC.createGain(); o.type = 'square'; o.frequency.value = freq * (ci % 2 === 0 ? 1 : 1.059);
        const lfo = AC.createOscillator(); const lfoG = AC.createGain(); lfo.frequency.value = 5.5; lfoG.gain.value = 3; lfo.connect(lfoG); lfoG.connect(o.frequency); lfo.start(cStart + offset * beat); lfo.stop(cStart + offset * beat + beat * 0.45 + 0.05); bgmNodes.push(lfo);
        g.gain.setValueAtTime(0, cStart + offset * beat); g.gain.linearRampToValueAtTime(0.06, cStart + offset * beat + 0.03); g.gain.exponentialRampToValueAtTime(0.001, cStart + offset * beat + beat * 0.45);
        o.connect(g); g.connect(sfxGain); o.start(cStart + offset * beat); o.stop(cStart + offset * beat + beat * 0.5); bgmNodes.push(o);
      });
    });
    t += loopLen; bgmNodes._timer = setTimeout(scheduleLoop, (loopLen - 0.5) * 1000);
  }
  scheduleLoop();
}

function stopBGM() { clearTimeout(bgmNodes._timer); bgmNodes.forEach(n => { try { n.stop(); } catch (e) { } }); bgmNodes = []; }

function sfxFire() {
  if (!sfxGain) return;
  const snap = AC.createOscillator(), sg = AC.createGain(); snap.type = 'square'; snap.frequency.setValueAtTime(800, AC.currentTime); snap.frequency.exponentialRampToValueAtTime(80, AC.currentTime + 0.08); sg.gain.setValueAtTime(0.4, AC.currentTime); sg.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.1); snap.connect(sg); sg.connect(sfxGain); snap.start(); snap.stop(AC.currentTime + 0.12);
}
function sfxFlight() {
  if (!sfxGain) return;
  const buf = AC.createBuffer(1, AC.sampleRate * .4, AC.sampleRate); const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * 0.3;
  const ws = AC.createBufferSource(), wg = AC.createGain(); const wf = AC.createBiquadFilter(); wf.type = 'bandpass'; wf.frequency.value = 400; wf.Q.value = 2; wg.gain.setValueAtTime(0, AC.currentTime); wg.gain.linearRampToValueAtTime(0.15, AC.currentTime + 0.05); wg.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.35); ws.buffer = buf; ws.connect(wf); wf.connect(wg); wg.connect(sfxGain); ws.start(); ws.stop(AC.currentTime + 0.4);
}
function sfxBirdHit() {
  if (!sfxGain) return;
  const o = AC.createOscillator(), g = AC.createGain(); o.type = 'sawtooth'; o.frequency.setValueAtTime(1200 + Math.random() * 400, AC.currentTime); o.frequency.exponentialRampToValueAtTime(150, AC.currentTime + 0.4); g.gain.setValueAtTime(0.4, AC.currentTime); g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.45); o.connect(g); g.connect(sfxGain); o.start(); o.stop(AC.currentTime + 0.5);
}
function sfxMiss() {
  if (!sfxGain) return;
  const o = AC.createOscillator(), g = AC.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(160, AC.currentTime); o.frequency.exponentialRampToValueAtTime(40, AC.currentTime + 0.15); g.gain.setValueAtTime(0.5, AC.currentTime); g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.2); o.connect(g); g.connect(sfxGain); o.start(); o.stop(AC.currentTime + 0.22);
}
function sfxGameOver() {
  if (!sfxGain) return;
  const notes = [523.25, 440.00, 349.23, 261.63]; notes.forEach((freq, i) => { const t = AC.currentTime + i * 0.22; const o = AC.createOscillator(), g = AC.createGain(); o.type = 'sawtooth'; o.frequency.value = freq; g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.22, t + 0.03); g.gain.setValueAtTime(0.22, t + 0.15); g.gain.exponentialRampToValueAtTime(0.001, t + 0.28); o.connect(g); g.connect(sfxGain); o.start(t); o.stop(t + 0.32); });
}
function sfxLevelClear() {
  if(!sfxGain) return;
  const notes = [523.25, 659.26, 783.99, 1046.50]; notes.forEach((freq, i) => { const t = AC.currentTime + i * 0.15; const o = AC.createOscillator(), g = AC.createGain(); o.type = 'square'; o.frequency.value = freq; g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.25, t + 0.02); g.gain.setValueAtTime(0.25, t + 0.08); g.gain.exponentialRampToValueAtTime(0.001, t + 0.22); o.connect(g); g.connect(sfxGain); o.start(t); o.stop(t + 0.25); });
}
function sfxClick() {
  if (!sfxGain) return;
  const o = AC.createOscillator(), g = AC.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(600, AC.currentTime); o.frequency.linearRampToValueAtTime(800, AC.currentTime + 0.05); g.gain.setValueAtTime(0.2, AC.currentTime); g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.1); o.connect(g); g.connect(sfxGain); o.start(); o.stop(AC.currentTime+0.12);
}
let pullOsc = null, pullG = null;
function sfxPullStart() {
  if (!sfxGain) return; if (pullOsc) { try { pullOsc.stop(); } catch (e) { } }
  pullOsc = AC.createOscillator(); pullG = AC.createGain(); pullOsc.type = 'sawtooth'; pullOsc.frequency.value = 150; pullG.gain.value = 0.06; pullOsc.connect(pullG); pullG.connect(sfxGain); pullOsc.start();
}
function sfxPullUpdate(power) { if (!pullOsc) return; pullOsc.frequency.value = 150 + power * 550; pullG.gain.value = 0.06 + power * 0.08; }
function sfxPullRelease() { if (!pullOsc) return; try { pullOsc.stop(AC.currentTime + 0.05); } catch (e) { } pullOsc = null; pullG = null; }
function sfxScore() {
  if (!sfxGain) return;
  const o = AC.createOscillator(), g = AC.createGain(); o.type = 'sine'; o.frequency.setValueAtTime(1047, AC.currentTime); o.frequency.linearRampToValueAtTime(1319, AC.currentTime + 0.08); g.gain.setValueAtTime(0.18, AC.currentTime); g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.2); o.connect(g); g.connect(sfxGain); o.start(); o.stop(AC.currentTime + 0.22);
}

document.getElementById('audio-btn').addEventListener('click', () => {
  if(masterGain) {
    const isMuted = masterGain.gain.value === 0;
    masterGain.gain.value = isMuted ? 1 : 0;
    document.getElementById('audio-btn').textContent = isMuted ? '🔊' : '🔇';
  }
});
</script>
