<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta charset="UTF-8">
  <title>curved-aframe</title>

  <script src="./js/8frame-1.5.0.min.js"></script>
  <script src="./js/xrextras.js"></script>
  <!--script src="./js/landing-page.js"></script-->  
  <script src="//cdn.8thwall.com/web/aframe/aframe-extras-7.2.0.min.js"></script>
  <script async src="./js/xr.js" data-preload-chunks="slam"></script>

  <style>
    /* UI 전체를 덮는 투명 레이어 */
#custom-ui-layer {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 999; pointer-events: auto;
}
.hidden { display: none !important; }  

/* 1. 미리보기 화면 */
.screen {
  position: relative; width: 100%; height: 100%; background: #ffff;
  display: flex; flex-direction: column;
}
.media-container {
  flex: 1;

  display: flex;
  justify-content: center;
  align-items: center;

  padding-top: 30px;
  padding-bottom: 20px;
}
.media-content {
  width: 90%;
  aspect-ratio: 4 / 5;

  object-fit: cover;

  border-radius: 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,.25);
}

/* 등대 정보 오버레이 */
.info-overlay {
  position: absolute; bottom: 20px; left: 20px; color: white;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
}
.info-overlay h3 { margin: 0; font-size: 1.5rem; }
.info-overlay p { margin: 5px 0 0 0; font-size: 1rem; opacity: 0.9; }

/* 하단 버튼 영역 */
.bottom-action {
  padding: 16px 20px; background: white; display: flex; gap: 12px;
}
.action-btn {
  flex: 1; padding: 15px; font-size: 1.2rem; font-weight: bold;
  background-color: #0056b3; color: white; border: none; border-radius: 8px; cursor: pointer;
}
.cancel-btn {
  flex: 1; padding: 15px; font-size: 1.2rem; font-weight: bold;
  background-color: #0056b3; color: white; border: none; border-radius: 8px; cursor: pointer;
}

/* 모달 공통 스타일 */
.modal {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center;
  z-index: 1000;
}
.modal-content {
  position: relative;

  background-image: url('./img/popup-bg-2.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  width: 80%;
  max-width: 340px;
  min-height: 260px;

  border-radius: 12px;
  padding: 25px 20px;

  text-align: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  border: 3px solid #3d6353;
  overflow: hidden;
}
.modal-content p { font-size: 1.1rem; line-height: 1.4; margin-bottom: 25px; color: #333; }
.share-text { font-size: 0.95rem !important; word-break: keep-all; }

.modal-buttons { display: flex; gap: 10px; }
.modal-buttons button {
  flex: 1; padding: 12px; font-size: 1rem; font-weight: bold;
  border: none; border-radius: 6px; cursor: pointer;
}
.btn-cancel { background: #e0e0e0; color: #555; }
.btn-primary { background: #E68A3F; color: white; }
.btn-secondary { background: #F4F1E8; color: #365246; }

        /* 우측 상단 X 버튼 */
        .modal-close {
            position: absolute;
            top: 15px; right: 15px;
            background-color: #669c8a;
            color: white;
            border: none;
            width: 28px; height: 28px;
            border-radius: 50%;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .preview-close {
            position: absolute;
            top: 15px; right: 15px;
            background-color: transparent;
            color: white;
            border: none;
            width: 35px; height: 35px;
            border-radius: 50%;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

  </style>
</head>

<body>

  <a-scene
    landing-page
    xrextras-loading
    xrextras-runtime-error
    renderer="colorManagement: true; physicallyBasedRendering: true;"
    xrweb="disableWorldTracking: true">

    <xrextras-capture-button capture-mode="photo"></xrextras-capture-button>
    <xrextras-capture-config file-name-prefix="my-photo-" request-mic="manual"></xrextras-capture-config>
    <!--xrextras-capture-preview style="display:none"></xrextras-capture-preview-->

    <a-camera position="0 1 1" raycaster="objects: .cantap" cursor="fuse: false; rayOrigin: mouse;"></a-camera>
    <a-light type="directional" intensity="2.5" position="0 1 0"></a-light>
    <a-light type="ambient" intensity="0.5"></a-light>
    <a-plane id="ground" rotation="-90 0 0" width="1000" height="1000" material="shader: shadow" shadow></a-plane>
  </a-scene>
  
  <div id="custom-ui-layer" class="hidden">
  
  <div id="preview-screen" class="screen hidden">
    <div class="media-container">
      <!--button class="preview-close" onclick="resetUI()">×</button-->
      <img id="preview-image" class="media-content hidden" />
      <video id="preview-video" class="media-content hidden" autoplay loop muted playsinline></video>
      
      <div class="info-overlay">
        <h3 id="lighthouse-name">📍 호미곶 등대</h3>
        <p id="capture-time"></p>
      </div>
    </div>
    
    <div class="bottom-action">
      <button id="btn-cancel" class="cancel-btn" style="background: linear-gradient(to right, #f0d7a6, #f0d7a6);" onclick="resetUI()">다시 촬영</button>
      <button id="btn-save-stamp" class="action-btn" style="background: linear-gradient(to right, #9AD28B, #37BBA3);">스탬프북 저장</button>
    </div>
  </div>

  <div id="modal-confirm" class="modal hidden">
    <div class="modal-content">
      <button class="modal-close"
        onclick="document.getElementById('modal-confirm').classList.add('hidden')">×
      </button>
      <p>현재 등대의 스탬프를 획득하고<br>사진을 저장하시겠습니까?</p>
      <div class="modal-buttons">
        <button id="btn-confirm-cancel" class="btn-cancel">취소</button>
        <button id="btn-confirm-save" class="btn-primary">확인</button>
      </div>
    </div>
  </div>

  <div id="modal-share" class="modal hidden">
    <div class="modal-content">
      <button class="modal-close"
        onclick="document.getElementById('modal-share').classList.add('hidden')">×
      </button>
      <p class="share-text">
        사진을 등대 커뮤니티에만 게시하려면 좌측의 <strong>'사진후기 게시'</strong> 버튼을,<br>
        게시 후 SNS 에 공유하려면 우측의 <strong>'게시 후 SNS 공유'</strong> 버튼을 눌러주세요.
      </p>
      <div class="modal-buttons flex-row">
        <button id="btn-post-review" class="btn-secondary">사진후기 게시</button>
        <button id="btn-post-share" class="btn-primary">게시 후 SNS 공유</button>
      </div>
    </div>
  </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const scene = document.querySelector('a-scene');

// ✅ 디버깅 코드를 맨 위로 — DOMContentLoaded 직후 즉시 실행
  const origDispatch = EventTarget.prototype.dispatchEvent;
  EventTarget.prototype.dispatchEvent = function(event) {
    if (event.type.includes('capture') || event.type.includes('photo') || 
        event.type.includes('record') || event.type.includes('xrextras')) {
      console.log('🔥 dispatchEvent 감지:', event.type, event.detail, this);
    }
    return origDispatch.call(this, event);
  };

  // ✅ scene이 로드된 후 이벤트 등록 (8th Wall은 scene 로드 후 동작)
  const registerEvents = () => {
    console.log('✅ scene 로드 완료, 이벤트 등록');
    
    scene.addEventListener('xrextras-capture-photo', (e) => {
      e.stopImmediatePropagation();
      console.log('📸 photo 이벤트 발생!', e.detail);
      
      const dataUrl = e.detail.dataUrl || e.detail.blob;
      if (dataUrl instanceof Blob) {
        const reader = new FileReader();
        reader.onload = (ev) => addTimestampToImage(ev.target.result, (composed) => {
          capturedDataUrl = composed;
          showPreview(composed, 'photo');
        });
        reader.readAsDataURL(dataUrl);
      } else {
        addTimestampToImage(dataUrl, (composed) => {
          capturedDataUrl = composed;
          showPreview(composed, 'photo');
        });
      }
    }, true);
  };

  // ✅ 8th Wall scene 로드 완료 후 등록 (loaded 이벤트 대기)
  if (scene.hasLoaded) {
    registerEvents();
  } else {
    scene.addEventListener('loaded', registerEvents);
  }


  const uiLayer = document.getElementById('custom-ui-layer');
  
  // 미리보기 요소
  const previewScreen = document.getElementById('preview-screen');
  const previewImg = document.getElementById('preview-image');
  const previewVid = document.getElementById('preview-video');
  const captureTimeText = document.getElementById('capture-time');
  const btnSaveStamp = document.getElementById('btn-save-stamp');

  // 모달 요소
  const modalConfirm = document.getElementById('modal-confirm');
  const btnConfirmCancel = document.getElementById('btn-confirm-cancel');
  const btnConfirmSave = document.getElementById('btn-confirm-save');

  const modalShare = document.getElementById('modal-share');
  const btnPostReview = document.getElementById('btn-post-review');
  const btnPostShare = document.getElementById('btn-post-share');

  // 임시 저장용 데이터 변수
  let capturedDataUrl = null;
  let capturedFile = null;

  // --- [1] 사진/영상 촬영 완료 이벤트 감지 ---  
 window.addEventListener('mediarecorder-photocomplete', (e) => {
  console.log('📸 photo 이벤트 발생!', e.detail);
  
  const reader = new FileReader();
  reader.onload = (ev) => {
    addTimestampToImage(ev.target.result, (composed) => {
      capturedDataUrl = composed;

      fetch(composed)
        .then(r => r.blob())
        .then(blob => {
          capturedFile = new File([blob], 'lighthouse-stamp.jpg', { type: 'image/jpeg' });
        });

      showPreview(composed, 'photo');
    });
  };
  reader.readAsDataURL(e.detail.blob);
});


  // ✅ 핵심 함수: Canvas로 시간 합성
function addTimestampToImage(dataUrl, callback) {
  const img = new Image();

  img.onload = () => {

    // ===== 최종 출력 크기 =====
    const targetWidth  = 1080;
    const targetHeight = 1350;   // 4:5 비율

    const canvas = document.createElement('canvas');
    canvas.width  = targetWidth;
    canvas.height = targetHeight;

    const ctx = canvas.getContext('2d');

    // ===== 중앙 크롭 계산 =====
    const targetRatio = targetWidth / targetHeight;
    const imageRatio  = img.width / img.height;

    let sx, sy, sw, sh;

    if (imageRatio > targetRatio) {
      // 사진이 더 넓음
      sh = img.height;
      sw = sh * targetRatio;

      sx = (img.width - sw) / 2;
      sy = 0;

    } else {
      // 사진이 더 길쭉함
      sw = img.width;
      sh = sw / targetRatio;

      sx = 0;
      sy = (img.height - sh) * 0.35;
    }

    // ===== 중앙 크롭 후 1080x1350으로 그림 =====
    ctx.drawImage(
      img,
      sx, sy,
      sw, sh,
      0, 0,
      targetWidth,
      targetHeight
    );

    // ===== 시간 스탬프 =====
    const now = new Date();

    const timeStr =
      `${now.getFullYear()}.` +
      `${String(now.getMonth()+1).padStart(2,'0')}.` +
      `${String(now.getDate()).padStart(2,'0')} ` +
      `${String(now.getHours()).padStart(2,'0')}:` +
      `${String(now.getMinutes()).padStart(2,'0')}`;

    const lighthouseName =
      document.getElementById('lighthouse-name').innerText;

    const fontSize = 42;

    ctx.font = `bold ${fontSize}px Arial`;

    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 8;
    ctx.shadowOffsetX = 2;
    ctx.shadowOffsetY = 2;

    ctx.fillStyle = 'white';

    // 등대명
    ctx.textAlign = 'left';
    ctx.fillText(
      lighthouseName,
      40,
      targetHeight - 50
    );

    // 시간
    ctx.textAlign = 'right';
    ctx.fillText(
      timeStr,
      targetWidth - 40,
      targetHeight - 50
    );

    callback(canvas.toDataURL('image/jpeg', 0.92));
  };

  img.src = dataUrl;
}

  function showPreview(mediaUrl, type) {
    uiLayer.classList.remove('hidden');
    previewScreen.classList.remove('hidden');

    document.querySelector('.info-overlay').classList.add('hidden');    
    
    if (type === 'photo') {
      previewImg.src = mediaUrl;
      previewImg.classList.remove('hidden');
      previewVid.classList.add('hidden');
    } else {
      previewVid.src = mediaUrl;
      previewVid.classList.remove('hidden');
      previewImg.classList.add('hidden');
      previewVid.play();
    }
  }

  // --- [2] 스탬프북 저장 (확인 모달 띄우기) ---
  btnSaveStamp.addEventListener('click', () => {
    modalConfirm.classList.remove('hidden');
  });

  // 저장 취소
  btnConfirmCancel.addEventListener('click', () => {
    modalConfirm.classList.add('hidden');
  });

  // DB 임시 저장 및 공유 모달 띄우기
  btnConfirmSave.addEventListener('click', () => {
    // TODO: 서버 API 통신 로직 추가 (여권번호, 등대위치, 촬영시간, 사진 데이터 전송)
    console.log("DB 저장 완료: 스탬프 획득 처리됨!");
    
    modalConfirm.classList.add('hidden');
    modalShare.classList.remove('hidden'); // 3번 프로세스로 넘어감
  });

  // --- [4] 사진후기 게시 버튼 로직 ---
  btnPostReview.addEventListener('click', () => {
    // TODO: 사용자 DB 정보에서 게시 flag = true 처리 로직
    console.log("게시 flag true 업데이트 완료 (game-process.html에 반영)");
    alert("사진 후기가 성공적으로 게시되었습니다.");
    resetUI();
  });

  // --- [5] 게시 후 SNS 공유 버튼 로직 ---
  btnPostShare.addEventListener('click', async () => {
  if (!capturedFile) {
    alert("사진 준비 중입니다. 잠시 후 다시 눌러주세요.");
    return;
  }

  if (navigator.canShare && navigator.canShare({ files: [capturedFile] })) {
    navigator.share({
      files: [capturedFile],
      title: '등대 스탬프 투어',
      text: '호미곶 등대에서 멋진 사진을 찍고 스탬프를 획득했어요!',
    }).then(() => { resetUI(); })
     .catch((err) => { console.log('공유 취소 또는 실패', err); resetUI(); });

  } else if (navigator.share) {
    navigator.share({
      title: '등대 스탬프 투어',
      text: '호미곶 등대에서 멋진 사진을 찍고 스탬프를 획득했어요!',
    }).then(() => resetUI()).catch(() => resetUI());

  } else {
    alert("해당 브라우저에서는 공유 기능을 지원하지 않습니다.");
    resetUI();
  }
});

// UI 초기화 및 AR 화면 복귀
  function resetUI() {
    uiLayer.classList.add('hidden');
    previewScreen.classList.add('hidden');
    modalConfirm.classList.add('hidden');
    modalShare.classList.add('hidden');

    previewImg.src = "";
    previewVid.src = "";

    capturedDataUrl = null;
    capturedFile = null;
}

window.resetUI = resetUI;

});

</script>

</body>
</html>
