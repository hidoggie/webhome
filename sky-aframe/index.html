<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>sky aframe</title>

  <script src="./../xr_st/8frame-1.5.0.min.js"></script>
  <script src="./../xr_st/xrextras.js"></script>
  <script src="./../xr_st/landing-page.js"></script>  
  <script src="./../xr_st/coaching-overlay.js"></script>
  <script src="./../xr_st/aframe-extras-6.1.1.min.js"></script>

  <script async src="./../xr_st/xr.js" data-preload-chunks="slam"></script>

  <script type="module" src="./app.js" defer></script>
  <link rel="stylesheet" href="./index.css">

</head>
<body>
<div id="orientationOverlay">
  <div id="message">
    <img src="./assets/UI/rotate.svg" width="100px" />
    Please rotate the phone to portrait mode for a better experience.
  </div>
</div>

<div id="bottomBar" style="display: none">
  <button id="leftButton">
    <img src="./assets/UI/triangle.svg" />
  </button>
  <button id="rightButton">
    <img src="./assets/UI/triangle.svg" />
  </button>
</div>

<a-scene
  landing-page
  xrextras-loading
  xrextras-runtime-error
  sky-coaching-overlay
  sky-recenter
  renderer="colorManagement: true"
  xrlayers="cameraDirection: back;"
  device-orientation>
  <a-assets>
    <a-asset-item id="doty" src="./assets/models/lego_man.glb"></a-asset-item>
    <a-asset-item id="airship" src="./assets/models/lego_star_destroyer.glb"></a-asset-item>
    <img id="skyTexture" src="./assets/textures/space.png" />
  </a-assets>

  <a-camera wasd-controls-enabled="false" near="0.1" position="0 0 0"></a-camera>

  <!--a-entity
    gltf-model="#airship"
    position="-20 20 -55"
    rotation="0 -15 0"
    animation-mixer="clip: idle; loop: repeat;"
    scale="0.1 0.1 0.1"></a-entity-->

  <a-entity light="type: ambient; intensity: 1;"></a-entity>

  <a-entity
    id="skyScene"
    xrlayerscene="name:sky; invertLayerMask:false; edgeSmoothness:0.6"
    sky-debug>
    <a-sky material="src: #skyTexture; transparent: true; opacity: 1; fog:false;"></a-sky>

    <a-entity id="pivot" position="0 0 0" rotation="0 0 0">
      <a-entity
        gltf-model="#doty"
        id="dotyModel"
        position="0 -7 -13"
        scale=".02 .02 .02"
        rotation="0 0 0"
        animation-mixer="clip: idle; loop: repeat;"
        sky-arrows>
      </a-entity>
    </a-entity>

    <a-entity
      light="
        type: directional; 
        castShadow: true; 
        color: white; 
        intensity: 0.2"
      position="5 10 7"
      rotation="45 0 45">
    </a-entity>

    <a-entity light="type: ambient; intensity: 1;"></a-entity>
  </a-entity>
</a-scene>
</body>
</html>
