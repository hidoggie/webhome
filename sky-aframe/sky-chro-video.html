<!DOCTYPE html>
<html lang="ko">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>sky aframe</title>

  <script src="./../xr_st/8frame-1.4.1.min.js"></script>
  <script src="./../xr_st/xrextras.js"></script>
  <script src="./../xr_st/landing-page.js"></script>  
  <script src="./../xr_st/coaching-overlay.js"></script>
  <script src="./../xr_st/aframe-extras-6.1.1.min.js"></script>

  <script async src="./../xr_st/xr.js" data-preload-chunks="slam"></script>

  <script type="module" src="./app2.js" defer></script>
  <link rel="stylesheet" href="./index.css">

</head>
<body>
<div id="orientationOverlay">
  <div id="message">
    <img src="./assets/UI/rotate.svg" width="100px" />
    Please rotate the phone to portrait mode for a better experience.
  </div>
</div>

<a-scene
  xrextras-gesture-detector
  landing-page
  xrextras-loading
  xrextras-runtime-error
  sky-coaching-overlay
  sky-recenter
  renderer="colorManagement: true"
  xrlayers="cameraDirection: back;"
  xrconfig
  xrweb="disableWorldTracking: true; allowedDevices: any">

  <a-assets>
    <img id="skyTexture" src="./assets/textures/space.png" />

    <!--
      ✅ FIX: autoplay + muted + playsinline 모두 명시
           webkit-playsinline은 구형 iOS 대응
    -->
    <video
      id="alpha-video"
      src="./cats.mp4"
      autoplay
      muted
      loop
      playsinline
      webkit-playsinline
      crossorigin="anonymous"
      preload="auto">
    </video>

    <video
      id="beta-video"
      src="./alpaca.mp4"
      autoplay
      muted
      loop
      playsinline
      webkit-playsinline
      crossorigin="anonymous"
      preload="auto">
    </video>
  </a-assets>

  <a-camera
    position="0 4 10"
    raycaster="objects: .cantap"
    cursor="fuse: false; rayOrigin: mouse;">
  </a-camera>

  <a-light type="directional" intensity="0.5" position="1 1 1"></a-light>
  <a-light type="ambient" intensity="1"></a-light>

  <a-entity
    id="skyScene"
    xrlayerscene="name:sky; invertLayerMask:false; edgeSmoothness:0.6">

    <a-sky material="src: #skyTexture; transparent: true; opacity: 1; fog: false;"></a-sky>

    <!--
      ✅ FIX 핵심: chromakey를 component가 아닌 material shader로 사용
                  src에 #alpha-video 셀렉터 전달
    -->
    <!--a-entity
      id="dotyModel"
      material="shader: chromakey; src: #beta-video; color: 0.1 0.9 0.2; opacity: 1; transparent: true"
      geometry="primitive: plane; height: 7; width: 7;"
      position="0 0.915 3"
      play-video="video: #alpha-video; autoplay: true"
    >
    </a-entity-->
    <a-entity
      id="dotyModel"
      material="shader: chromakey;
                src: #alpha-video;
                color: 0.1 0.9 0.2;
                threshold: 0.35;
                smoothness: 0.08;
                spill: 1.0;
                opacity: 1"
      geometry="primitive: plane; height: 7; width: 7;"
      position="0 0.915 0"
      play-video="video: #alpha-video; autoplay: true">
    </a-entity>


  </a-entity>
</a-scene>

<script>
  // ✅ FIX: 화면 터치 시 비디오 재생 강제 실행 (모바일 브라우저 autoplay 정책 우회)
  window.addEventListener('touchstart', function onFirstTouch() {
    document.querySelectorAll('video').forEach(v => {
      v.muted = true
      v.play().catch(() => {})
    })
    window.removeEventListener('touchstart', onFirstTouch)
  }, {once: true})
</script>

</body>
</html>
